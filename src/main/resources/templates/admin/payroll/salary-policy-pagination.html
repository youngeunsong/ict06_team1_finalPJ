<!-- templates/admin/payroll/fragments/pagination.html -->

<th:block th:fragment="pagination(pageResponse, searchDTO)">

    <!-- 페이지가 2페이지 이상일 때만 표시 -->
    <nav th:if="${pageResponse.totalPages >= 1}" class="mt-3">

        <!-- 현재 페이지 기준 10개 단위 블록 계산 -->
        <th:block th:with="
            currentPage=${pageResponse.page},
            totalPages=${pageResponse.totalPages},
            blockSize=10,
            startPage=${((currentPage - 1) / blockSize) * blockSize + 1},
            endPage=${T(java.lang.Math).min((startPage + blockSize - 1).intValue(), totalPages.intValue())}">

            <ul class="pagination justify-content-center">

                <!-- 이전 블록 -->
                <li class="page-item" th:classappend="${startPage <= 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/payroll/salary-policy(
                          page=${startPage > 1 ? startPage - 1 : 1},
                          size=${pageResponse.size},
                          deptId=${searchDTO.deptId},
                          positionId=${searchDTO.positionId},
                          gradeId=${searchDTO.gradeId},
                          keyword=${searchDTO.keyword}
                       )}">
                        이전
                    </a>
                </li>

                <!-- 1~10, 11~20 단위 페이지 번호 -->
                <li class="page-item"
                    th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">

                    <a class="page-link"
                       th:text="${pageNum}"
                       th:href="@{/admin/payroll/salary-policy(
                        page=${pageNum},
                        size=${pageResponse.size},
                        deptId=${searchDTO.deptId},
                        positionId=${searchDTO.positionId},
                        gradeId=${searchDTO.gradeId},
                        keyword=${searchDTO.keyword}
                    )}">
                    </a>
                </li>

                <!-- 다음 블록 -->
                <li class="page-item" th:classappend="${endPage >= totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/payroll/salary-policy(
                          page=${endPage < totalPages ? endPage + 1 : totalPages},
                          size=${pageResponse.size},
                          deptId=${searchDTO.deptId},
                          positionId=${searchDTO.positionId},
                          gradeId=${searchDTO.gradeId},
                          keyword=${searchDTO.keyword}
                    )}">
                        다음
                    </a>
                </li>

            </ul>
        </th:block>
    </nav>

</th:block>
