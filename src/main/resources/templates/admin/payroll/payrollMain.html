<!--
[ 관리자용 페이지 템플릿 사용 방법]
1. 핵심 콘텐츠 작성법
<div class="container-fluid">
    이 사이에 넣을 핵심콘텐츠에 필요한 타임리프 코드를 작성해주세요
</div>

2. 모든 관리자용 페이지에 반드시 포함시킬 파일: header, head, sidebar, commonJs.html (이 파일들은 수정 시 반드시 팀원들과 협의해주세요)
-->
<!doctype html>
<html xmlns:th="http://www.thymleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">급여 관리 메인</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>

                <!-- 페이지 제목 -->
                <div class="row mb-4">
                    <div class="col">
                        <h3 class="fw-bold mb-1">급여 관리</h3>
                        <p class="text-muted mb-0">
                            급여대장 작성, 급여요약 조회, 기본급 정책 관리를 한 곳에서 관리합니다.
                        </p>
                    </div>
                </div>

                <!-- 급여 메뉴 카드 -->
                <div class="row g-3">

                    <!-- 급여대장관리 -->
                    <div class="col-12">
                        <a th:href="@{/admin/payroll/main}"
                           class="text-decoration-none text-dark">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-2">급여대장관리</h5>
                                    <p class="text-muted mb-0">
                                        사원별 월 급여대장을 작성하고 지급/공제항목, 4대보험 계산,
                                        저장, 확정, 지급확정 처리를 관리합니다.
                                    </p>
                                </div>
                            </div>
                        </a>
                    </div>

                    <!-- 급여요약 -->
                    <div class="col-12">
                        <a th:href="@{/admin/payroll/summary}"
                           class="text-decoration-none text-dark">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-2">급여요약</h5>
                                    <p class="text-muted mb-0">
                                        확정 또는 지급완료된 급여 내역을 사원별, 월별로 조회하고
                                        급여명세서 확인용 데이터를 관리합니다.
                                    </p>
                                </div>
                            </div>
                        </a>
                    </div>

                    <!-- 기본급 관리 -->
                    <div class="col-12">
                        <a th:href="@{/admin/payroll/salary-policy}"
                           class="text-decoration-none text-dark">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-bold mb-2">기본급 관리</h5>
                                    <p class="text-muted mb-0">
                                        부서, 직급, 급여등급 기준의 기본급 정책을 등록, 수정, 삭제하고
                                        급여대장 기본급 산정 기준으로 사용합니다.
                                    </p>
                                </div>
                            </div>
                        </a>
                    </div>

                </div>
                <!-- end::Row-->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
