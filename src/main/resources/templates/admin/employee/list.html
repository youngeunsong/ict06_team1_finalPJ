<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    사원 목록 화면(list.html)

    역할:
    - 사원 목록을 테이블로 보여준다.
    - 검색 조건을 입력해서 GET /admin/employees 로 다시 요청한다.
    - 사원 이름을 클릭하면 상세 화면으로 이동한다.
    - 화면 동작 JS는 /static/js/employee/list.js 로 분리했다.
-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">사원 관리</title>
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

    <!-- 공통 상단 헤더 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>

    <!-- 공통 사이드바 -->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <br>

                <!-- 페이지 제목 / 등록 버튼 영역 -->
                <div class="row mb-3">
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <div>
                            <h3 class="mb-1">사원 관리</h3>
                            <p class="text-muted mb-0">사원 목록 조회, 검색, 등록을 관리합니다.</p>
                        </div>

                        <!-- 사원 등록 화면 이동 -->
                        <a href="/admin/employees/new" class="btn btn-primary">
                            <i class="fa-solid fa-user-plus"></i>
                            사원 등록
                        </a>
                    </div>
                </div>

                <!-- 검색 조건 영역 -->
                <div class="row mb-3">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">

                                <!--
                                    검색 form

                                    method="get"
                                    - 검색 조건을 URL 파라미터로 보낸다.

                                    예:
                                    /admin/employees?keyword=홍길동&deptId=1&status=재직
                                -->
                                <form id="employeeSearchForm"
                                      method="get"
                                      action="/admin/employees"
                                      class="row g-2">

                                    <!-- 키워드 검색 -->
                                    <!-- 사번, 아이디, 이름, 이메일, 연락처를 대상으로 검색한다. -->
                                    <div class="col-md-3">
                                        <input type="text"
                                               name="keyword"
                                               class="form-control"
                                               placeholder="사번, 아이디, 이름, 이메일, 연락처 검색"
                                               th:value="${condition.keyword}">
                                    </div>

                                    <!-- 부서 검색 조건 -->
                                    <div class="col-md-2">
                                        <select name="deptId" class="form-select">
                                            <option value="">전체 부서</option>
                                            <option th:each="dept : ${departments}"
                                                    th:value="${dept.id}"
                                                    th:text="${dept.name}"
                                                    th:selected="${condition.deptId != null and condition.deptId == dept.id}">
                                            </option>
                                        </select>
                                    </div>

                                    <!-- 직급 검색 조건 -->
                                    <div class="col-md-2">
                                        <select name="positionId" class="form-select">
                                            <option value="">전체 직급</option>
                                            <option th:each="position : ${positions}"
                                                    th:value="${position.id}"
                                                    th:text="${position.name}"
                                                    th:selected="${condition.positionId != null and condition.positionId == position.id}">
                                            </option>
                                        </select>
                                    </div>

                                    <!-- 권한 검색 조건 -->
                                    <div class="col-md-2">
                                        <select name="roleId" class="form-select">
                                            <option value="">전체 권한</option>
                                            <option th:each="role : ${roles}"
                                                    th:value="${role.id}"
                                                    th:text="${role.name}"
                                                    th:selected="${condition.roleId != null and condition.roleId == role.id}">
                                            </option>
                                        </select>
                                    </div>

                                    <!-- 상태 검색 조건 -->
                                    <div class="col-md-2">
                                        <select name="status" class="form-select">
                                            <option value="기본"
                                                    th:selected="${condition.status == null or condition.status == '기본'}">
                                                재직/휴직
                                            </option>
                                            <option value="전체"
                                                    th:selected="${condition.status == '전체'}">
                                                전체
                                            </option>
                                            <option value="재직"
                                                    th:selected="${condition.status == '재직'}">
                                                재직
                                            </option>
                                            <option value="휴직"
                                                    th:selected="${condition.status == '휴직'}">
                                                휴직
                                            </option>
                                            <option value="퇴사"
                                                    th:selected="${condition.status == '퇴사'}">
                                                퇴사
                                            </option>
                                        </select>
                                    </div>

                                    <!-- 검색 버튼 -->
                                    <div class="col-md-1 d-grid">
                                        <button type="submit" class="btn btn-dark">
                                            검색
                                        </button>
                                    </div>

                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 사원 목록 테이블 영역 -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <strong>사원 목록</strong>

                                <!-- 현재 조회된 사원 수 표시 -->
                                <span class="text-muted ms-2" th:text="'총 ' + ${employees.size()} + '명'"></span>
                            </div>

                            <div class="card-body table-responsive p-0">
                                <table class="table table-hover text-nowrap mb-0 align-middle">
                                    <thead class="table-light">
                                    <tr>
                                        <th>사번</th>
                                        <th>아이디</th>
                                        <th>이름</th>
                                        <th>부서</th>
                                        <th>직급</th>
                                        <th>권한</th>
                                        <th>상태</th>
                                        <th>이메일</th>
                                        <th>연락처</th>
                                        <th>입사일</th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <!-- employees 목록을 반복해서 테이블 행 생성 -->
                                    <tr th:each="emp : ${employees}">
                                        <td th:text="${emp.empNo}"></td>
                                        <td th:text="${emp.empId}"></td>

                                        <!-- 이름 클릭 시 해당 사원의 상세 화면으로 이동 -->
                                        <td>
                                            <a th:href="@{/admin/employees/{empNo}(empNo=${emp.empNo})}"
                                               th:text="${emp.name}"
                                               class="text-decoration-none fw-semibold">
                                            </a>
                                        </td>

                                        <td th:text="${emp.deptName}"></td>
                                        <td th:text="${emp.positionName}"></td>
                                        <td th:text="${emp.roleName}"></td>

                                        <!-- 상태값에 따라 badge 색상 다르게 표시 -->
                                        <td>
                                            <span th:if="${emp.status == '재직'}"
                                                  class="badge bg-success"
                                                  th:text="${emp.status}">
                                            </span>

                                            <span th:if="${emp.status == '휴직'}"
                                                  class="badge bg-warning text-dark"
                                                  th:text="${emp.status}">
                                            </span>

                                            <span th:if="${emp.status == '퇴사'}"
                                                  class="badge bg-secondary"
                                                  th:text="${emp.status}">
                                            </span>
                                        </td>

                                        <td th:text="${emp.email}"></td>
                                        <td th:text="${emp.phone}"></td>
                                        <td th:text="${emp.hireDate}"></td>
                                    </tr>

                                    <!-- 조회 결과가 없을 때 보여줄 문구 -->
                                    <tr th:if="${#lists.isEmpty(employees)}">
                                        <td colspan="10" class="text-center text-muted py-4">
                                            조회된 사원이 없습니다.
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 공통 푸터 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<!-- 공통 JS -->
<th:block th:replace="~{/admin/common/commonJs}"></th:block>

<!-- 사원 목록 화면 전용 JS -->
<script th:src="@{/js/employee/list.js}"></script>

</body>
</html>
