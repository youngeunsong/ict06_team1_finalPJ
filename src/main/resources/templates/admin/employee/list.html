<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    사원 목록 화면(list.html)

    역할:
    - 사원 목록을 테이블로 보여준다.
    - 검색 조건을 입력해서 GET /admin/employees 로 다시 요청한다.
    - 사원 이름을 클릭하면 상세 화면으로 이동한다.
    - 사원 목록 검색 조건에서 본부/팀을 2단계로 선택한다.
    - 화면 동작 JS는 /static/js/employee/list.js 로 분리했다.
    - 조직도 탭 동작 JS는 /static/js/employee/org.js 로 분리했다.
-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">사원 관리</title>
</head>

<style>
    /*
     * 조직도 탭 전용 스타일
     *
     * 기존 사원 목록 화면은 Bootstrap/AdminLTE 스타일을 그대로 사용하고,
     * 조직도 탭에 필요한 트리 UI와 그룹핑 사원 목록 UI만 여기서 추가한다.
     */

    .org-wrapper {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
    }

    @media (max-width: 992px) {
        .org-wrapper {
            grid-template-columns: 1fr;
        }
    }

    .org-tree-area {
        min-height: 420px;
    }

    .dept-tree-item {
        position: relative;
        margin: 4px 0;
    }

    .dept-tree-children {
        margin-left: 18px;
        padding-left: 14px;
        border-left: 1px solid #dee2e6;
    }

    .dept-tree-children.closed {
        display: none;
    }

    .dept-tree-children.open {
        display: block;
    }

    .dept-node {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 14px;
        color: #343a40;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }

    .dept-node.root-dept {
        font-weight: 700;
    }

    .dept-node.child-dept {
        font-size: 13px;
        color: #495057;
    }

    .dept-node:hover {
        background-color: #eef4ff;
        color: #0d6efd;
    }

    .dept-node.active {
        background-color: #0d6efd;
        color: #ffffff;
        font-weight: 600;
    }

    .dept-toggle-icon,
    .dept-toggle-empty {
        width: 16px;
        display: inline-block;
        color: inherit;
    }

    .dept-label {
        flex: 1;
    }

    .org-search-box {
        margin-bottom: 14px;
    }

    .org-search-input {
        max-width: 360px;
    }

    .org-help-text {
        font-size: 13px;
        color: #6c757d;
    }

    .org-employee-scroll {
        max-height: 560px;
        overflow-y: auto;
        padding-right: 4px;
    }

    .org-summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }

    .org-summary-title {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
    }

    .org-total-badge {
        font-size: 13px;
    }

    .position-group-card {
        border: 1px solid #e9ecef;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
        background: #ffffff;
    }

    .position-group-header {
        background: #f8f9fa;
        padding: 12px 14px;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e9ecef;
    }

    .position-group-card table {
        margin-bottom: 0;
    }

    .org-empty-message {
        color: #6c757d;
        padding: 24px 0;
        text-align: center;
    }
</style>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

    <!-- 공통 상단 헤더 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>

    <!-- 공통 사이드바 -->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <br>

                <!-- 페이지 제목 / 등록 버튼 영역 -->
                <div class="row mb-3">
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <div>
                            <h3 class="mb-1">사원 관리</h3>
                            <p class="text-muted mb-0">사원 목록 조회, 검색, 등록을 관리합니다.</p>
                        </div>

                        <a href="/admin/employees/new" class="btn btn-primary">
                            <i class="fa-solid fa-user-plus"></i>
                            사원 등록
                        </a>
                    </div>
                </div>

                <!-- 사원 관리 탭 영역 -->
                <ul class="nav nav-tabs mb-3" id="employeeManageTabs" role="tablist">

                    <li class="nav-item" role="presentation">
                        <button class="nav-link active"
                                id="employee-list-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#employee-list-pane"
                                type="button"
                                role="tab"
                                aria-controls="employee-list-pane"
                                aria-selected="true">
                            사원 목록
                        </button>
                    </li>

                    <li class="nav-item" role="presentation">
                        <button class="nav-link"
                                id="employee-org-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#employee-org-pane"
                                type="button"
                                role="tab"
                                aria-controls="employee-org-pane"
                                aria-selected="false">
                            조직도
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="employeeManageTabContent">

                    <!-- 사원 목록 탭 -->
                    <div class="tab-pane fade show active"
                         id="employee-list-pane"
                         role="tabpanel"
                         aria-labelledby="employee-list-tab">

                        <!-- 검색 조건 영역 -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-body">

                                        <form id="employeeSearchForm"
                                              method="get"
                                              action="/admin/employees"
                                              class="row g-2">

                                            <!-- 키워드 검색 -->
                                            <div class="col-md-3">
                                                <input type="text"
                                                       name="keyword"
                                                       class="form-control"
                                                       placeholder="사번, 아이디, 이름, 이메일, 연락처 검색"
                                                       th:value="${condition.keyword}">
                                            </div>

                                            <!-- 본부 검색 조건 -->
                                            <div class="col-md-2">
                                                <select name="parentDeptId"
                                                        id="parentDeptSelect"
                                                        class="form-select">
                                                    <option value="">전체 본부</option>

                                                    <option th:each="dept : ${parentDepartments}"
                                                            th:value="${dept.id}"
                                                            th:text="${dept.name}"
                                                            th:selected="${condition.parentDeptId != null and condition.parentDeptId == dept.id}">
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- 팀 검색 조건 -->
                                            <div class="col-md-2">
                                                <select name="deptId"
                                                        id="teamDeptSelect"
                                                        class="form-select">
                                                    <option value="">전체 팀</option>

                                                    <option th:each="team : ${teams}"
                                                            th:value="${team.id}"
                                                            th:text="${team.name}"
                                                            th:selected="${condition.deptId != null and condition.deptId == team.id}">
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- 직급 검색 조건 -->
                                            <div class="col-md-2">
                                                <select name="positionId" class="form-select">
                                                    <option value="">전체 직급</option>

                                                    <option th:each="position : ${positions}"
                                                            th:value="${position.id}"
                                                            th:text="${position.name}"
                                                            th:selected="${condition.positionId != null and condition.positionId == position.id}">
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- 권한 검색 조건 -->
                                            <div class="col-md-2">
                                                <select name="roleId" class="form-select">
                                                    <option value="">전체 권한</option>

                                                    <option th:each="role : ${roles}"
                                                            th:value="${role.id}"
                                                            th:text="${role.name}"
                                                            th:selected="${condition.roleId != null and condition.roleId == role.id}">
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- 상태 검색 조건 -->
                                            <div class="col-md-2">
                                                <select name="status" class="form-select">
                                                    <option value="기본"
                                                            th:selected="${condition.status == null or condition.status == '기본'}">
                                                        재직/휴직
                                                    </option>

                                                    <option value="전체"
                                                            th:selected="${condition.status == '전체'}">
                                                        전체
                                                    </option>

                                                    <option value="재직"
                                                            th:selected="${condition.status == '재직'}">
                                                        재직
                                                    </option>

                                                    <option value="휴직"
                                                            th:selected="${condition.status == '휴직'}">
                                                        휴직
                                                    </option>

                                                    <option value="퇴사"
                                                            th:selected="${condition.status == '퇴사'}">
                                                        퇴사
                                                    </option>
                                                </select>
                                            </div>

                                            <!-- 검색 버튼 -->
                                            <div class="col-md-1 d-grid">
                                                <button type="submit" class="btn btn-dark">
                                                    검색
                                                </button>
                                            </div>

                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 사원 목록 테이블 영역 -->
                        <div class="row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <strong>사원 목록</strong>
                                        <span class="text-muted ms-2"
                                              th:text="'총 ' + ${employeePage.totalElements} + '명'">
                                        </span>
                                    </div>

                                    <div class="card-body table-responsive p-0">
                                        <table class="table table-hover text-nowrap mb-0 align-middle">
                                            <thead class="table-light">
                                            <tr>
                                                <th>사번</th>
                                                <th>아이디</th>
                                                <th>이름</th>
                                                <th>부서</th>
                                                <th>직급</th>
                                                <th>권한</th>
                                                <th>상태</th>
                                                <th>이메일</th>
                                                <th>연락처</th>
                                                <th>입사일</th>
                                            </tr>
                                            </thead>

                                            <tbody>
                                            <tr th:each="emp : ${employees}">
                                                <td th:text="${emp.empNo}"></td>
                                                <td th:text="${emp.empId}"></td>

                                                <td>
                                                    <a th:href="@{/admin/employees/{empNo}(empNo=${emp.empNo})}"
                                                       th:text="${emp.name}"
                                                       class="text-decoration-none fw-semibold">
                                                    </a>
                                                </td>

                                                <td th:text="${emp.deptName}"></td>
                                                <td th:text="${emp.positionName}"></td>
                                                <td th:text="${emp.roleName}"></td>

                                                <td>
                                                    <span th:if="${emp.status == '재직'}"
                                                          class="badge bg-success"
                                                          th:text="${emp.status}">
                                                    </span>

                                                    <span th:if="${emp.status == '휴직'}"
                                                          class="badge bg-warning text-dark"
                                                          th:text="${emp.status}">
                                                    </span>

                                                    <span th:if="${emp.status == '퇴사'}"
                                                          class="badge bg-secondary"
                                                          th:text="${emp.status}">
                                                    </span>
                                                </td>

                                                <td th:text="${emp.email}"></td>
                                                <td th:text="${emp.phone}"></td>
                                                <td th:text="${emp.hireDate}"></td>
                                            </tr>

                                            <tr th:if="${#lists.isEmpty(employees)}">
                                                <td colspan="10" class="text-center text-muted py-4">
                                                    조회된 사원이 없습니다.
                                                </td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- 페이징 영역 -->
                                    <div class="card-footer clearfix"
                                         th:if="${employeePage != null and employeePage.totalPages > 0}"
                                         th:with="
                                            startPage=${page - 2 < 0 ? 0 : page - 2},
                                            endPage=${page + 2 >= employeePage.totalPages ? employeePage.totalPages - 1 : page + 2}
                                         ">

                                        <div class="float-start text-muted small">
                                            <span th:text="'전체 ' + ${employeePage.totalElements} + '명'"></span>
                                            <span th:text="' / ' + (${page} + 1) + ' / ' + ${employeePage.totalPages} + ' 페이지'"></span>
                                        </div>

                                        <ul class="pagination pagination-sm m-0 float-end">

                                            <!-- 처음 페이지 -->
                                            <li class="page-item"
                                                th:classappend="${employeePage.first} ? 'disabled'">
                                                <a class="page-link"
                                                   th:href="@{/admin/employees(
                                                        page=0,
                                                        size=${size},
                                                        keyword=${condition.keyword},
                                                        parentDeptId=${condition.parentDeptId},
                                                        deptId=${condition.deptId},
                                                        positionId=${condition.positionId},
                                                        roleId=${condition.roleId},
                                                        status=${condition.status}
                                                   )}">
                                                    처음
                                                </a>
                                            </li>

                                            <!-- 이전 페이지 -->
                                            <li class="page-item"
                                                th:classappend="${employeePage.first} ? 'disabled'">
                                                <a class="page-link"
                                                   th:href="@{/admin/employees(
                                                        page=${page - 1},
                                                        size=${size},
                                                        keyword=${condition.keyword},
                                                        parentDeptId=${condition.parentDeptId},
                                                        deptId=${condition.deptId},
                                                        positionId=${condition.positionId},
                                                        roleId=${condition.roleId},
                                                        status=${condition.status}
                                                   )}">
                                                    이전
                                                </a>
                                            </li>

                                            <!-- 페이지 번호 -->
                                            <li class="page-item"
                                                th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                                                th:classappend="${pageNum == page} ? 'active'">
                                                <a class="page-link"
                                                   th:href="@{/admin/employees(
                                                        page=${pageNum},
                                                        size=${size},
                                                        keyword=${condition.keyword},
                                                        parentDeptId=${condition.parentDeptId},
                                                        deptId=${condition.deptId},
                                                        positionId=${condition.positionId},
                                                        roleId=${condition.roleId},
                                                        status=${condition.status}
                                                   )}"
                                                   th:text="${pageNum + 1}">
                                                </a>
                                            </li>

                                            <!-- 다음 페이지 -->
                                            <li class="page-item"
                                                th:classappend="${employeePage.last} ? 'disabled'">
                                                <a class="page-link"
                                                   th:href="@{/admin/employees(
                                                        page=${page + 1},
                                                        size=${size},
                                                        keyword=${condition.keyword},
                                                        parentDeptId=${condition.parentDeptId},
                                                        deptId=${condition.deptId},
                                                        positionId=${condition.positionId},
                                                        roleId=${condition.roleId},
                                                        status=${condition.status}
                                                   )}">
                                                    다음
                                                </a>
                                            </li>

                                            <!-- 마지막 페이지 -->
                                            <li class="page-item"
                                                th:classappend="${employeePage.last} ? 'disabled'">
                                                <a class="page-link"
                                                   th:href="@{/admin/employees(
                                                        page=${employeePage.totalPages - 1},
                                                        size=${size},
                                                        keyword=${condition.keyword},
                                                        parentDeptId=${condition.parentDeptId},
                                                        deptId=${condition.deptId},
                                                        positionId=${condition.positionId},
                                                        roleId=${condition.roleId},
                                                        status=${condition.status}
                                                   )}">
                                                    마지막
                                                </a>
                                            </li>

                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 조직도 탭 -->
                    <div class="tab-pane fade"
                         id="employee-org-pane"
                         role="tabpanel"
                         aria-labelledby="employee-org-tab">

                        <div class="org-wrapper">

                            <div class="card">
                                <div class="card-header">
                                    <strong>조직도</strong>
                                    <span class="text-muted ms-2">부서를 선택하세요</span>
                                </div>

                                <div class="card-body org-tree-area">
                                    <div id="departmentTree">
                                        조직도 정보를 불러오는 중입니다.
                                    </div>
                                </div>
                            </div>

                            <div class="card">
                                <div class="card-header">
                                    <strong id="orgEmployeeTitle">부서를 선택해주세요</strong>
                                </div>

                                <div class="card-body">
                                    <div class="org-search-box">
                                        <input type="text"
                                               id="orgEmployeeSearchInput"
                                               class="form-control org-search-input"
                                               placeholder="이름 또는 사번 검색"
                                               disabled>

                                        <div class="org-help-text mt-1">
                                            부서를 선택하면 해당 부서 사원 중에서 검색할 수 있습니다.
                                        </div>
                                    </div>

                                    <div id="orgEmployeeArea" class="org-employee-scroll">
                                        <div class="org-empty-message">
                                            왼쪽 조직도에서 부서를 클릭하면 사원 목록이 표시됩니다.
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <!-- 공통 푸터 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<!-- 공통 JS -->
<th:block th:replace="~{/admin/common/commonJs}"></th:block>

<!-- 사원 목록 화면 전용 JS -->
<script th:src="@{/js/employee/list.js}"></script>

<!-- 조직도 탭 화면 전용 JS -->
<script th:src="@{/js/employee/org.js}"></script>

</body>
</html>
