<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    사원 수정 화면(edit.html)

    역할:
    - 기존 사원 정보를 수정하는 화면
    - 수정된 값은 POST /admin/employees/{empNo}/edit 로 전송된다.
    - 사번, 로그인 아이디, 입사일은 수정하지 못하도록 readonly 처리한다.
    - 화면 동작 JS는 /static/js/employee/edit.js 로 분리했다.
-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">사원 수정</title>
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

    <!-- 공통 상단 헤더 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>

    <!-- 공통 사이드바 -->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <br>

                <!-- 페이지 제목 영역 -->
                <div class="row mb-3">
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <div>
                            <h3 class="mb-1">사원 수정</h3>
                            <p class="text-muted mb-0">사원 정보를 수정합니다.</p>
                        </div>

                        <!-- 현재 사원의 상세 화면으로 이동 -->
                        <a th:href="@{/admin/employees/{empNo}(empNo=${employeeUpdateRequestDto.empNo})}"
                           class="btn btn-secondary">
                            상세로
                        </a>
                    </div>
                </div>

                <!--
                    사원 수정 form

                    th:object="${employeeUpdateRequestDto}"
                    - Controller에서 model에 담아준 EmployeeUpdateRequestDto와 연결된다.
                -->
                <form id="employeeUpdateForm"
                      method="post"
                      enctype="multipart/form-data"
                      th:action="@{/admin/employees/{empNo}/edit(empNo=${employeeUpdateRequestDto.empNo})}"
                      th:object="${employeeUpdateRequestDto}">

                    <!-- Controller에서 전달한 에러 정보를 JS에서 읽기 위한 hidden 값 -->
                    <input type="hidden" id="errorMessage" th:value="${errorMessage}">
                    <input type="hidden" id="errorField" th:value="${errorField}">

                    <div class="card">
                        <div class="card-header">
                            <strong>수정 정보</strong>
                        </div>

                        <div class="card-body">
                            <div class="row g-3">

                                <!-- 사번 -->
                                <!-- 수정 불가 항목 -->
                                <div class="col-md-4">
                                    <label class="form-label">사번</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input type="text"
                                               th:field="*{empNo}"
                                               class="form-control bg-light text-muted"
                                               readonly>
                                    </div>
                                    <small class="text-muted">사번은 수정할 수 없습니다.</small>
                                </div>

                                <!-- 로그인 아이디 -->
                                <!-- 수정 불가 항목 -->
                                <div class="col-md-4">
                                    <label class="form-label">로그인 아이디</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input type="text"
                                               th:field="*{empId}"
                                               class="form-control bg-light text-muted"
                                               readonly>
                                    </div>
                                    <small class="text-muted">로그인 아이디는 수정할 수 없습니다.</small>
                                </div>

                                <!-- 입사일 -->
                                <!-- 수정 불가 항목 -->
                                <div class="col-md-4">
                                    <label class="form-label">입사일</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input type="date"
                                               th:field="*{hireDate}"
                                               class="form-control bg-light text-muted"
                                               readonly>
                                    </div>
                                    <small class="text-muted">입사일은 수정할 수 없습니다.</small>
                                </div>

                                <!-- 이름 -->
                                <div class="col-md-4">
                                    <label class="form-label">이름 <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{name}"
                                           class="form-control required-input">
                                </div>

                                <!-- 이메일 -->
                                <!-- 기존 이메일을 emailId / emailDomain으로 나눠서 보여준다. -->
                                <div class="col-md-4">
                                    <label class="form-label">이메일 <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="text"
                                               th:field="*{emailId}"
                                               id="emailId"
                                               class="form-control required-input">

                                        <span class="input-group-text">@</span>

                                        <select th:field="*{emailDomain}"
                                                id="emailDomain"
                                                class="form-select required-input">
                                            <option value="">선택</option>
                                            <option value="gmail.com">gmail.com</option>
                                            <option value="naver.com">naver.com</option>
                                            <option value="daum.net">daum.net</option>
                                            <option value="kakao.com">kakao.com</option>
                                            <option value="nate.com">nate.com</option>

                                            <!-- 기본 목록에 없는 도메인이라면 기존 도메인도 option으로 보여준다. -->
                                            <option th:if="${employeeUpdateRequestDto.emailDomain != null
                                                           and employeeUpdateRequestDto.emailDomain != 'gmail.com'
                                                           and employeeUpdateRequestDto.emailDomain != 'naver.com'
                                                           and employeeUpdateRequestDto.emailDomain != 'daum.net'
                                                           and employeeUpdateRequestDto.emailDomain != 'kakao.com'
                                                           and employeeUpdateRequestDto.emailDomain != 'nate.com'}"
                                                    th:value="${employeeUpdateRequestDto.emailDomain}"
                                                    th:text="${employeeUpdateRequestDto.emailDomain}">
                                            </option>

                                            <option value="custom">직접입력</option>
                                        </select>
                                    </div>

                                    <!-- 직접 입력 선택 시 JS에서 보이게 한다. -->
                                    <input type="text"
                                           id="customEmailDomain"
                                           class="form-control mt-2 d-none"
                                           placeholder="도메인 직접 입력 예: company.com">
                                </div>

                                <!-- 연락처 -->
                                <div class="col-md-4">
                                    <label class="form-label">연락처 <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{phone}"
                                           id="phone"
                                           class="form-control required-input"
                                           maxlength="13">
                                </div>

                                <!-- 부서 -->
                                <div class="col-md-4">
                                    <label class="form-label">부서 <span class="text-danger">*</span></label>
                                    <select th:field="*{deptId}" class="form-select required-input">
                                        <option value="">부서 선택</option>
                                        <option th:each="dept : ${departments}"
                                                th:value="${dept.id}"
                                                th:text="${dept.name}">
                                        </option>
                                    </select>
                                </div>

                                <!-- 직급 -->
                                <div class="col-md-4">
                                    <label class="form-label">직급 <span class="text-danger">*</span></label>
                                    <select th:field="*{positionId}" class="form-select required-input">
                                        <option value="">직급 선택</option>
                                        <option th:each="position : ${positions}"
                                                th:value="${position.id}"
                                                th:text="${position.name}">
                                        </option>
                                    </select>
                                </div>

                                <!-- 권한 -->
                                <div class="col-md-4">
                                    <label class="form-label">권한 <span class="text-danger">*</span></label>
                                    <select th:field="*{roleId}" class="form-select required-input">
                                        <option value="">권한 선택</option>
                                        <option th:each="role : ${roles}"
                                                th:value="${role.id}"
                                                th:text="${role.name}">
                                        </option>
                                    </select>
                                </div>

                                <!-- 재직 상태 -->
                                <!-- 상태가 바뀌면 Service에서 변경 이력을 저장한다. -->
                                <div class="col-md-4">
                                    <label class="form-label">상태 <span class="text-danger">*</span></label>
                                    <select th:field="*{status}" class="form-select required-input">
                                        <option value="">상태 선택</option>
                                        <option value="재직">재직</option>
                                        <option value="휴직">휴직</option>
                                        <option value="퇴사">퇴사</option>
                                    </select>
                                </div>

                                <!-- 은행명 -->
                                <div class="col-md-4">
                                    <label class="form-label">은행명 <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{bank}"
                                           class="form-control required-input">
                                </div>

                                <!-- 계좌번호 -->
                                <div class="col-md-4">
                                    <label class="form-label">계좌번호 <span class="text-danger">*</span></label>
                                    <input type="text"
                                           th:field="*{accountNo}"
                                           id="accountNo"
                                           class="form-control required-input">
                                </div>

                                <!-- 새 비밀번호 -->
                                <!-- 비워두면 기존 비밀번호가 유지된다. -->
                                <div class="col-md-4">
                                    <label class="form-label">새 비밀번호</label>
                                    <input type="password"
                                           th:field="*{password}"
                                           id="password"
                                           class="form-control"
                                           placeholder="변경하지 않으려면 비워두세요">
                                    <small class="text-muted">입력한 경우에만 비밀번호가 변경됩니다.</small>
                                </div>

                                <!-- 프로필 사진 -->
                                <!-- 기존 이미지가 있으면 미리 보여주고, 새 파일 선택 시 교체된다. -->
                                <div class="col-md-6">
                                    <label class="form-label">프로필 사진</label>
                                    <input type="file"
                                           th:field="*{profileImgFile}"
                                           id="profileImgFile"
                                           class="form-control"
                                           accept="image/png, image/jpeg">

                                    <div class="mt-2">
                                        <img id="profilePreview"
                                             th:src="${employeeUpdateRequestDto.profileImg}"
                                             th:style="${employeeUpdateRequestDto.profileImg != null}
                                                ? 'width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;'
                                                : 'display: none; width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;'"
                                             alt="프로필 미리보기">
                                    </div>

                                    <small class="text-muted">새 파일을 선택하면 기존 프로필 사진이 교체됩니다.</small>
                                </div>

                                <!-- 서명 이미지 -->
                                <div class="col-md-6">
                                    <label class="form-label">서명 이미지</label>
                                    <input type="file"
                                           th:field="*{signImgFile}"
                                           id="signImgFile"
                                           class="form-control"
                                           accept="image/png, image/jpeg">

                                    <div class="mt-2">
                                        <img id="signPreview"
                                             th:src="${employeeUpdateRequestDto.signImg}"
                                             th:style="${employeeUpdateRequestDto.signImg != null}
                                                ? 'width: 180px; height: 80px; object-fit: contain; border-radius: 8px; border: 1px solid #ddd; background: #fff;'
                                                : 'display: none; width: 180px; height: 80px; object-fit: contain; border-radius: 8px; border: 1px solid #ddd; background: #fff;'"
                                             alt="서명 미리보기">
                                    </div>

                                    <small class="text-muted">새 파일을 선택하면 기존 서명 이미지가 교체됩니다.</small>
                                </div>

                            </div>
                        </div>

                        <!-- 하단 버튼 영역 -->
                        <div class="card-footer text-end">
                            <a th:href="@{/admin/employees/{empNo}(empNo=${employeeUpdateRequestDto.empNo})}"
                               class="btn btn-outline-secondary">
                                취소
                            </a>

                            <button type="submit" class="btn btn-primary">
                                저장
                            </button>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </main>

    <!-- 공통 푸터 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<!-- 공통 JS -->
<th:block th:replace="~{/admin/common/commonJs}"></th:block>

<!-- 사원 수정 화면 전용 JS -->
<script th:src="@{/js/employee/edit.js}"></script>

</body>
</html>
