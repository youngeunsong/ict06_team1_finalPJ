<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    사원 상세 화면(detail.html)

    역할:
    - 특정 사원의 상세 정보를 보여준다.
    - Controller에서 employee라는 이름으로 전달한 EmployeeDetailDto를 화면에 출력한다.
    - 수정 버튼을 누르면 해당 사원의 수정 화면으로 이동한다.
    - 화면 동작 JS는 /static/js/employee/detail.js 로 분리했다.
-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">사원 상세</title>
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

    <!-- 공통 상단 헤더 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>

    <!-- 공통 사이드바 -->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <br>

                <!-- 페이지 제목 영역 -->
                <div class="row mb-3">
                    <div class="col-12 d-flex justify-content-between align-items-center">
                        <div>
                            <h3 class="mb-1">사원 상세</h3>
                            <p class="text-muted mb-0">사원의 상세 정보를 확인합니다.</p>
                        </div>

                        <!-- 목록 화면으로 이동 -->
                        <div>
                            <a href="/admin/employees" class="btn btn-secondary">
                                목록으로
                            </a>
                        </div>
                    </div>
                </div>

                <div class="row">

                    <!-- 이미지 정보 영역 -->
                    <div class="col-md-4">
                        <div class="card mb-3">
                            <div class="card-header">
                                <strong>이미지 정보</strong>
                            </div>

                            <div class="card-body text-center">
                                <!-- 프로필 사진 -->
                                <div class="mb-4">
                                    <label class="form-label fw-semibold d-block">프로필 사진</label>

                                    <!-- 프로필 이미지가 있으면 이미지 출력 -->
                                    <img th:if="${employee.profileImg != null}"
                                         th:src="${employee.profileImg}"
                                         alt="프로필 사진"
                                         style="width: 150px; height: 150px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd;">

                                    <!-- 프로필 이미지가 없으면 안내 문구 출력 -->
                                    <div th:if="${employee.profileImg == null}"
                                         class="text-muted border rounded d-flex align-items-center justify-content-center mx-auto"
                                         style="width: 150px; height: 150px;">
                                        프로필 없음
                                    </div>
                                </div>

                                <!-- 서명 이미지 -->
                                <div>
                                    <label class="form-label fw-semibold d-block">서명 이미지</label>

                                    <!-- 서명 이미지가 있으면 이미지 출력 -->
                                    <img th:if="${employee.signImg != null}"
                                         th:src="${employee.signImg}"
                                         alt="서명 이미지"
                                         style="width: 220px; height: 100px; object-fit: contain; border-radius: 8px; border: 1px solid #ddd; background: #fff;">

                                    <!-- 서명 이미지가 없으면 안내 문구 출력 -->
                                    <div th:if="${employee.signImg == null}"
                                         class="text-muted border rounded d-flex align-items-center justify-content-center mx-auto"
                                         style="width: 220px; height: 100px;">
                                        서명 없음
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 기본 정보 영역 -->
                    <div class="col-md-4">
                        <div class="card mb-3">
                            <div class="card-header">
                                <strong>기본 정보</strong>
                            </div>

                            <div class="card-body">
                                <table class="table table-bordered mb-0">
                                    <tbody>
                                    <tr>
                                        <th class="table-light" style="width: 35%;">사번</th>
                                        <td th:text="${employee.empNo}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">로그인 아이디</th>
                                        <td th:text="${employee.empId}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">이름</th>
                                        <td th:text="${employee.name}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">이메일</th>
                                        <td th:text="${employee.email}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">연락처</th>
                                        <td th:text="${employee.phone}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">입사일</th>
                                        <td th:text="${employee.hireDate}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">상태</th>
                                        <td>
                                            <!-- 상태에 따라 다른 색상의 badge 출력 -->
                                            <span th:if="${employee.status == '재직'}"
                                                  class="badge bg-success"
                                                  th:text="${employee.status}"></span>

                                            <span th:if="${employee.status == '휴직'}"
                                                  class="badge bg-warning text-dark"
                                                  th:text="${employee.status}"></span>

                                            <span th:if="${employee.status == '퇴사'}"
                                                  class="badge bg-secondary"
                                                  th:text="${employee.status}"></span>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 조직 / 계좌 정보 영역 -->
                    <div class="col-md-4">

                        <!-- 조직 정보 -->
                        <div class="card mb-3">
                            <div class="card-header">
                                <strong>조직 정보</strong>
                            </div>

                            <div class="card-body">
                                <table class="table table-bordered mb-0">
                                    <tbody>
                                    <tr>
                                        <th class="table-light" style="width: 35%;">부서</th>
                                        <td th:text="${employee.deptName}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">직급</th>
                                        <td th:text="${employee.positionName}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">권한</th>
                                        <td th:text="${employee.roleName}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- 급여 계좌 정보 -->
                        <div class="card mb-3">
                            <div class="card-header">
                                <strong>급여 계좌 정보</strong>
                            </div>

                            <div class="card-body">
                                <table class="table table-bordered mb-0">
                                    <tbody>
                                    <tr>
                                        <th class="table-light" style="width: 35%;">은행명</th>
                                        <td th:text="${employee.bank}"></td>
                                    </tr>
                                    <tr>
                                        <th class="table-light">계좌번호</th>
                                        <td th:text="${employee.accountNo}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 하단 버튼 영역 -->
                <div class="row mb-4">
                    <div class="col-12 text-end">
                        <a href="/admin/employees" class="btn btn-outline-secondary">
                            목록
                        </a>

                        <!-- 수정 화면으로 이동 -->
                        <a th:href="@{/admin/employees/{empNo}/edit(empNo=${employee.empNo})}"
                           class="btn btn-primary">
                            수정
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 공통 푸터 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<!-- 공통 JS -->
<th:block th:replace="~{/admin/common/commonJs}"></th:block>

<!-- 사원 상세 화면 전용 JS -->
<script th:src="@{/js/employee/detail.js}"></script>

</body>
</html>
