<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{/admin/common/head.html :: common_header}">
    <title id="page_title">COREWORK Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{css/admin/home.css}">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="container-fluid p-4" style="max-width: 1160px; margin: 0 auto;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0" style="color: #3c4b64;">
                    CORE<span style="color: #321fdb;">WORK</span>
                    <small class="text-muted" style="font-size: 1.2rem;">Admin Center</small>
                </h2>
            </div>

            <div class="row">
                <div class="col-xxl-3 col-xl-6 col-md-6 mb-4 d-flex">
                    <div class="card h-100 shadow-sm border-0 card-core w-100" style="border-top-color: #321fdb !important;">
                        <div class="card-body py-3">
                            <div class="mb-2">
                                <span class="badge border" style="background-color: #eef2ff; color: #321fdb; border-color: #c7d2fe !important;">전체 온보딩 대상</span>
                            </div>
                            <div class="h3 mb-0 fw-bold text-dark" th:text="${totalOnboarding + '명'}">0명</div>
                        </div>
                    </div>
                </div>

                <div class="col-xxl-3 col-xl-6 col-md-6 mb-4 d-flex">
                    <div class="card h-100 shadow-sm border-0 card-core w-100" style="border-top-color: #2eb85c !important;">
                        <div class="card-body py-3">
                            <div class="mb-2">
                                <span class="badge border" style="background-color: #eef2ff; color: #321fdb; border-color: #c7d2fe !important;">평균 온보딩 완료율</span>
                            </div>
                            <div class="h3 mb-0 fw-bold text-dark" th:text="${avgProgress + '%'}">0%</div>
                        </div>
                    </div>
                </div>

                <div class="col-xxl-3 col-xl-6 col-md-6 mb-4 d-flex">
                    <div class="card h-100 shadow-sm border-0 card-core w-100" style="border-top-color: #f9b115 !important;">
                        <div class="card-body py-3">
                            <div class="mb-2">
                                <span class="badge border" style="background-color: #eef2ff; color: #321fdb; border-color: #c7d2fe !important;">평가 제출 건수</span>
                            </div>
                            <div class="h3 mb-0 fw-bold text-dark" th:text="${evaluationSubmissions + '건'}">0건</div>
                        </div>
                    </div>
                </div>

                <div class="col-xxl-3 col-xl-6 col-md-6 mb-4 d-flex">
                    <div class="card h-100 shadow-sm border-0 card-core w-100" style="border-top-color: #3399ff !important;">
                        <div class="card-body py-3">
                            <div class="mb-2">
                                <span class="badge border" style="background-color: #eef2ff; color: #321fdb; border-color: #c7d2fe !important;">AI 비서 사용 건수</span>
                            </div>
                            <div class="h3 mb-0 fw-bold text-dark" th:text="${#numbers.formatInteger(aiActivities, 0, 'COMMA') + '건'}">0건</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-4 mb-4 d-flex">
                    <div class="card shadow-sm border-0 h-100 w-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-dark">
                                팀별 온보딩 완료율 (%)
                                <span class="badge border ms-2" style="background-color: #eef2ff; color: #321fdb; border-color: #c7d2fe !important;">AI Analysis</span>
                            </h6>
                        </div>
                        <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 340px;">
                            <canvas id="onboardingChart" height="300"></canvas>
                            <div id="onboardingEmpty" class="text-muted" style="display: none;">온보딩 진행 데이터가 없습니다.</div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-4 mb-4 d-flex">
                    <div class="card shadow-sm border-0 h-100 w-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-dark">RAG 지식베이스 처리 현황</h6>
                        </div>
                        <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 340px;">
                            <canvas id="ragStatusChart" height="300"></canvas>
                            <div id="ragEmpty" class="text-muted" style="display: none;">RAG 처리 데이터가 없습니다.</div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-4 mb-4 d-flex">
                    <div class="card shadow-sm border-0 h-100 w-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-dark">AI 비서 기능 활용도</h6>
                        </div>
                        <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 340px;">
                            <canvas id="aiUsageChart" height="300"></canvas>
                            <div id="aiUsageEmpty" class="text-muted" style="display: none;">AI 활용 데이터가 없습니다.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-xl-6 mb-4 d-flex">
                    <div class="card shadow-sm border-0 h-100 w-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-dark">부서별 평균 퀴즈 점수</h6>
                        </div>
                        <div class="card-body d-flex align-items-center justify-content-center" style="min-height: 340px;">
                            <canvas id="quizScoreChart" height="300"></canvas>
                            <div id="quizEmpty" class="text-muted" style="display: none;">퀴즈 성적 데이터가 없습니다.</div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-6 mb-4 d-flex">
                    <div class="card shadow-sm border-0 h-100 w-100">
                        <div class="card-header bg-white border-0 py-3">
                            <h6 class="fw-bold mb-0 text-dark">최근 시스템 활동</h6>
                        </div>
                        <div class="card-body p-0">
                            <div class="list-group list-group-flush border-top-0" th:if="${recentActivities != null and !#lists.isEmpty(recentActivities)}">
                                <a th:each="activity : ${recentActivities}"
                                   th:href="${activity.url}"
                                   class="list-group-item list-group-item-action px-4 py-3 border-start border-4"
                                   th:classappend="${activity.borderClass}">
                                    <div class="small text-muted mb-1" th:text="${activity.time_label}">방금 전</div>
                                    <div class="fw-bold small" th:classappend="${activity.textClass}" th:text="${activity.title}">활동</div>
                                    <span th:text="${activity.message}">최근 활동 내용</span>
                                </a>
                            </div>
                            <div class="p-4 text-muted" th:if="${recentActivities == null or #lists.isEmpty(recentActivities)}">
                                최근 시스템 활동이 없습니다.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const stats = [[${stats}]];

        // 1. 온보딩 완료율 차트
        const onboardingData = stats?.onboarding || [];
        if (onboardingData.length === 0) {
            document.getElementById('onboardingChart').style.display = 'none';
            document.getElementById('onboardingEmpty').style.display = 'block';
        } else {
            new Chart(document.getElementById('onboardingChart'), {
                type: 'bar',
                data: {
                    labels: onboardingData.map(d => d.dept_name),
                    datasets: [{
                        label: '완료율(%)',
                        data: onboardingData.map(d => d.completion_rate),
                        backgroundColor: '#321fdb',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 2. RAG 상태 차트
        const ragData = stats?.rag || [];
        if (ragData.length === 0) {
            document.getElementById('ragStatusChart').style.display = 'none';
            document.getElementById('ragEmpty').style.display = 'block';
        } else {
            new Chart(document.getElementById('ragStatusChart'), {
                type: 'pie',
                data: {
                    labels: ragData.map(d => d.stage),
                    datasets: [{
                        data: ragData.map(d => d.count),
                        backgroundColor: ['#3399ff', '#2eb85c', '#f9b115', '#e55353']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // 3. AI 비서 활용도 차트 (기존 로직 유지 및 보강)
        const aiUsageData = stats?.ai_usage || {};
        if (Object.keys(aiUsageData).length === 0) {
            document.getElementById('aiUsageChart').style.display = 'none';
            document.getElementById('aiUsageEmpty').style.display = 'block';
        } else {
            new Chart(document.getElementById('aiUsageChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(aiUsageData),
                    datasets: [{
                        data: Object.values(aiUsageData),
                        backgroundColor: ['#321fdb', '#3399ff', '#ced2d8', '#f9b115']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // 4. 퀴즈 점수 차트
        const quizData = stats?.quiz || [];
        if (quizData.length === 0) {
            document.getElementById('quizScoreChart').style.display = 'none';
            document.getElementById('quizEmpty').style.display = 'block';
        } else {
            new Chart(document.getElementById('quizScoreChart'), {
                type: 'bar',
                data: {
                    labels: quizData.map(d => d.dept_name),
                    datasets: [{
                        label: '평균 점수',
                        data: quizData.map(d => d.avg_score),
                        backgroundColor: '#2eb85c',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    });
</script>
</body>
</html>
