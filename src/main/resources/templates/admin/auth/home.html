<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">관리자 페이지</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" th:href="@{css/admin/home.css}">
</head>
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <h2>관리자 페이지</h2>

        <form method="post" action="/admin/logout">
            <button class="logout-btn">로그아웃</button>
        </form>

        <div class="container">

            <h2>📊 관리자 홈</h2>
            <p>시스템 관리 기능을 선택하세요.</p>

            <div class="card-grid">

                <div class="card" onclick="location.href='#'">
                    <div class="card-title">👤 사용자 관리</div>
                    <div>회원 정보 조회 및 관리</div>
                </div>

                <div class="card" onclick="location.href='#'">
                    <div class="card-title">📚 온보딩 관리</div>
                    <div>로드맵 및 학습 콘텐츠 관리</div>
                </div>

                <div class="card" onclick="location.href='#'">
                    <div class="card-title">📝 평가 관리</div>
                    <div>퀴즈 및 평가 결과 관리</div>
                </div>

                <div class="card" onclick="location.href='#'">
                    <div class="card-title">📄 결재 관리</div>
                    <div>전자결재 문서 관리</div>
                </div>

            </div>

        </div>
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->

<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
