<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>관리자 페이지</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" th:href="@{css/admin/home.css}">
</head>

<body>

<h2>관리자 페이지</h2>

<form method="post" action="/admin/logout">
    <button class="logout-btn">로그아웃</button>
</form>

<div class="container">

    <h2>📊 관리자 홈</h2>
    <p>시스템 관리 기능을 선택하세요.</p>

    <div class="card-grid">

        <div class="card" onclick="location.href='#'">
            <div class="card-title">👤 사용자 관리</div>

        </div>

        <div class="card" onclick="location.href='#'">
            <div class="card-title">📝 평가 관리</div>
            <div>퀴즈 및 평가 결과 관리</div>
        </div>

        <div class="card" onclick="location.href='#'">
            <div class="card-title">📄 결재 관리</div>
