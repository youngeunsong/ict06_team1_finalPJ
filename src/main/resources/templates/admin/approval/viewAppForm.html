<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">전자결재 서식 상세</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>

        <div class="app-content">
            <div class="container-fluid">
                <br>
                <div class="row">
                    <h3>전자결재 서식 상세</h3>
                </div>

                <div class="row">
                    <table class="table">
                        <tr>
                            <th style="width: 180px;">서식 번호</th>
                            <td th:text="${form.formId}"></td>
                        </tr>
                        <tr>
                            <th>서식명</th>
                            <td th:text="${form.formName}"></td>
                        </tr>
                        <tr>
                            <th>서식 미리보기</th>
                            <td>
                                <div id="formContainer"></div>
                                <script th:inline="javascript">
                                    document.addEventListener('DOMContentLoaded', function () {
                                        const template = JSON.parse(/*[[${form.template}]]*/ '{}');
                                        renderForm(template);
                                    });
                                </script>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/approval/appFormList}" class="btn btn-secondary">목록</a>
                    <a th:href="@{/admin/approval/editAppForm/{formId}(formId=${form.formId})}"
                       class="btn btn-primary"
                       th:unless="${form.isDefault}">
                        수정
                    </a>
                    <button type="button"
                            class="btn btn-danger btn-sm"
                            th:unless="${form.isDefault}"
                            th:onclick="|deleteAppForm(${form.formId})|">
                        삭제
                    </button>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="/js/approval/deleteAppForm.js"></script>
<script>
    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    /**
     * 저장된 template JSON을 읽어 관리자 상세 화면용 미리보기 HTML로 렌더링합니다.
     */
    function renderForm(templateJson) {
        let html = `
            <div class="text-center mb-4">
                <h3>${escapeHtml(templateJson.title)}</h3>
            </div>
            <div class="border-top">
        `;

        const now = new Date().toTimeString().slice(0, 5);
        const today = new Date().toISOString().slice(0, 10);

        (templateJson.fields || []).forEach(field => {
            html += `
                <div class="row align-items-center py-3 border-bottom">
                    <div class="col-md-4">
                        <label class="mb-0 fw-semibold">${escapeHtml(field.label)}</label>
                        ${field.description ? `<div class="small text-muted">${escapeHtml(field.description)}</div>` : ''}
                    </div>
                    <div class="col-md-8">
            `;

            if (field.type === 'text') {
                html += `<input type="text" class="form-control" placeholder="${escapeHtml(field.placeholder)}">`;
            }
            if (field.type === 'date') {
                html += `<input type="date" class="form-control" value="${today}">`;
            }
            if (field.type === 'number') {
                html += `<input type="number" class="form-control" placeholder="${escapeHtml(field.placeholder || '0')}">`;
            }
            if (field.type === 'time') {
                html += `<input type="time" class="form-control" value="${now}">`;
            }
            if (field.type === 'amount') {
                const amount = String(field.placeholder || '').replace(/[^\d]/g, '');
                const formattedAmount = amount ? Number(amount).toLocaleString('ko-KR') + ' 원' : '';
                html += `<input type="text" class="form-control" inputmode="numeric" placeholder="0 원" value="${formattedAmount}">`;
            }
            if (field.type === 'select') {
                const options = Array.isArray(field.options) ? field.options : [];
                const optionHtml = options
                    .map(option => `<option>${escapeHtml(option)}</option>`)
                    .join('');
                html += `<select class="form-select">${optionHtml}</select>`;
            }

            html += `
                    </div>
                </div>
            `;
        });

        html += '</div>';

        if (templateJson.fileRequired) {
            html += `
                <div class="row align-items-center py-3">
                    <div class="col-md-4 fw-semibold">첨부파일</div>
                    <div class="col-md-8"><input type="file" class="form-control"></div>
                </div>
            `;
        }

        $('#formContainer').html(html);
    }
</script>
</body>
</html>
