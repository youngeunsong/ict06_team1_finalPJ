 * 2026-05-04   송영은       서식 수정 오류 해결
 * 2026-05-14   송영은       셀렉트 박스 필드 및 테이블형 입력 레이아웃 추가
-->
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">전자결재 서식 수정</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>

        <div class="app-content">
            <div class="container-fluid">
                <br>
                <div class="row">
                    <h3>전자결재 서식 수정</h3>
                </div>

                <div class="row">
                    <!-- 왼쪽: 수정 중 새로 추가할 수 있는 필드 유형 -->
                    <div class="col-md-3">
                        <div class="card p-3">
                            <h5>필드 추가</h5>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('text')">
                                <i class="fa-solid fa-t"></i> 단일 텍스트
                            </button>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('number')">
                                <i class="fa-solid fa-hashtag"></i> 숫자
                            </button>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('date')">
                                <i class="fa-solid fa-calendar-days"></i> 날짜 선택
                            </button>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('time')">
                                <i class="fa-solid fa-clock"></i> 시간
                            </button>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('amount')">
                                <i class="fa-solid fa-won-sign"></i> 금액
                            </button>
                            <button type="button" class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('select')">
                                <i class="fa-solid fa-list"></i> 셀렉트 박스
                            </button>
                        </div>
                    </div>

                    <!-- 오른쪽: DB에 저장된 template JSON을 복원해 수정하는 영역 -->
                    <div class="col-md-9">
                        <form id="formUpdateEditor">
                            <div class="card p-4">
                                <h5 class="card-header">서식 미리보기</h5>
                                <span class="text-muted">항목명과 입력 필드를 행 단위로 맞춰 작성합니다.</span>

                                <div class="mb-4 border-bottom pb-3 text-center">
                                    <input type="text"
                                           name="formTitle"
                                           id="formTitle"
                                           class="form-control form-control-lg text-center border-0 shadow-none"
                                           placeholder="문서 제목을 입력하세요."
                                           required
                                           th:value="${form.formName}">
                                </div>

                                <div id="dynamicFields" class="border-top"></div>

                                <div class="mb-4 border-bottom py-3">
                                    <div class="row align-items-center">
                                        <label class="col-md-4 col-form-label">
                                            <i class="fa-solid fa-cloud-arrow-up"></i> 첨부파일
                                        </label>
                                        <div class="col-md-8">
                                            <select class="form-select" id="isFileRequired" required>
                                                <option value="" selected>선택해주세요</option>
                                                <option value="no">사용 안 함</option>
                                                <option value="yes">필수 사용</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <br>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/approval/viewAppForm/{id}(id=${form.formId})}" class="btn btn-secondary">돌아가기</a>
                                <button type="submit" class="btn btn-primary">수정 완료</button>
                                <button type="button"
                                        class="btn btn-danger btn-sm"
                                        th:unless="${form.isDefault}"
                                        th:onclick="|deleteAppForm(${form.formId})|">
                                    삭제
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>

<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="/js/approval/createTemplate.js"></script>
<script src="/js/approval/deleteAppForm.js"></script>
<script th:inline="javascript">
    const formId = /*[[${form.formId}]]*/ 0;

    // 기존 template JSON을 동적 필드 UI로 복원합니다.
    document.addEventListener('DOMContentLoaded', function () {
        const template = JSON.parse(/*[[${form.template}]]*/ '{}');
        loadTemplate(template);
    });

    $('#formUpdateEditor').on('submit', function (e) {
        e.preventDefault();

        const formData = collectTemplateData();

        $.ajax({
            url: `/admin/approval/updateAppForm/${formId}`,
            type: 'PUT',
            contentType: 'application/json; charset=UTF-8',
            data: JSON.stringify({
                formId: formId,
                formName: formData.title,
                template: JSON.stringify(formData)
            }),
            success: function () {
                alert('성공적으로 수정되었습니다.');
                location.href = '/admin/approval/viewAppForm/' + formId;
            },
            error: function (err) {
                console.error('서식 수정 실패:', err);
                alert('수정 실패');
            }
        });
    });
</script>
</body>
</html>
