 * description : 관리자용 - 전자결재 서식 관리 메인 페이지 (모든 전자 결재 서식 조회 + 추가/수정/삭제 버튼 제공)
 * ========================================
 * DATE         AUTHOR      NOTE

-->
<!doctype html>
<html xmlns:th="http://www.thymleaf.org">
<!--begin::Head-->
<head th:insert="/admin/common/head.html :: common_header">
    <title id="page_title">전자 결재 서식 관리 메인</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--전자결재용 서브 헤더 시작-->
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>
        <!--전자결재용 서브 헤더 끝-->
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>전자 결재 서식 관리 메인</h3>
                </div>
                <!-- end::Row-->
                <!--새 서식 추가 버튼 시작-->
                <div class="row">
                    <div class="d-flex flex-row-reverse">
                        <button type="button" class="btn btn-success" th:onclick="|location.href='@{/admin/approval/createAppForm}'|">
                            (+) 새 서식 추가
                        </button>
                    </div>
                </div>
                <!--새 서식 추가 버튼 끝-->
                <br>
                <!-- begin::서식 표 시작-->
                <div class="row">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>✅</th>
                                <th>서식 번호</th>
                                <th>서식 명</th>
                                <th>최종 수정일</th>
                                <th>관리</th> <!-- 수정, 삭제 버튼-->
                            </tr>
                        </thead>

                        <tbody id="tableBody">
                        <!-- JS로 채우기 -->
                        </tbody>
                    </table>
                </div>
                <!-- end::서식 표 끝-->
                <!-- 페이징 코드 시작-->
                <div class="d-flex justify-content-center">
                    <nav>
                        <ul class="pagination" id="pagination">
                            <!-- JS로 생성 -->
                        </ul>
                    </nav>
                </div>
                <!-- 페이징 코드 끝 -->
                <!-- 결재선 서식 설정 modal 시작 -->
                 <div class="modal fade"
                    id="lineTemplateModal"
                    tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">
                                    결재선 서식 선택
                                </h5>
                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal">
                                </button>
                            </div>
                            <div class="modal-body">
                                <div class="row">

                                    <!-- 좌측 목록 시작 -->
                                    <div class="col-4 border-end">
                                        <div id="lineTemplateList"></div>
                                    </div>
                                    <!-- 좌측 목록 끝 -->
                                    <!-- 우측 상세 시작-->
                                    <div class="col-8">
                                        <div id="lineTemplatePreview">
                                            <div class="text-muted">
                                                결재선을 선택하세요.
                                            </div>
                                        </div>
                                    </div>
                                    <!-- 우측 상세 끝-->
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button"
                                        class="btn btn-secondary"
                                        data-bs-dismiss="modal">
                                    취소
                                </button>
                                <button type="button"
                                        class="btn btn-primary"
                                        id="saveLineTemplateBtn">
                                    적용
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 결재선 서식 설정 modal 끝 -->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->

<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> <!-- jQuery -->
<script src="/js/approval/deleteAppForm.js"></script> <!-- 서식 삭제 함수 -->
<script>
    let currentFormId = null;
    let selectedTemplateId = null; // modal reopen 시 현재 선택 유지

    // [Ajax + 렌더링 js]
    let currentPage = 0;
    const pageSize = 10;

    // 최초 로딩
    $(document).ready(function () {
        loadPage(0);
    });

    // 데이터 조회
    function loadPage(page) {
        $.ajax({
            url: "/admin/approval/getAppForms",
            type: "GET",
            data: {
                page: page,
                size: pageSize
            },
            success: function (data) {
                renderTable(data.content);
                renderPagination(data);
                currentPage = page;
            },
            error: function () {
                alert("데이터 조회 실패");
            }
        });
    }

    // [테이블 렌더링]
    function renderTable(list) {
        let html = "";

        list.forEach(item => {
            let createdAt = new Date(item.updatedAt).toLocaleString();
            // event.stopPropagation() : 버튼 클릭 시 기본 이벤트 (row 클릭) 방지
            html += `
                <tr class="app-form-row"
                    data-form-id="${item.formId}"
                    style="cursor:pointer;">
                    <td><input type="checkbox" class="form-check-input" onclick="event.stopPropagation()"></td>
                    <td>${item.formId}</td>
                    <td>${item.formName}</td>
                    <td>${createdAt ?? ''}</td>
                    <td>
                        <button class="btn btn-primary btn-sm"
                            onclick="event.stopPropagation();goEdit(${item.formId})">
                            수정
                        </button>
                        <button type="button" class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteAppForm(${item.formId})">삭제</button>
                        <button
                            type="button"
                            class="btn btn-sm btn-outline-primary open-line-modal"

                            data-form-id="${item.formId}"
                            data-line-template-id="${
                                item.lineTemplateId ?? ''
                            }">

                            결재선 설정

                            ${
                                item.lineTemplateName
                                ? `
                                    <span class="badge bg-primary ms-1">
                                        ${item.lineTemplateName}
                                    </span>
                                `
                                : ''
                            }

                        </button>
                    </td>
                </tr>
            `;
        });

        $("#tableBody").html(html);
    }

    // 행 클릭 시 상세 페이지로 이동
    $(document).on(
        'click',
        '.app-form-row',
        function () {
            const formId =
                $(this).data('form-id');

            goDetail(formId);
        }
    );

    // 페이지 렌더링
    function renderPagination(pageData) {
        let html = "";

        // 이전 버튼
        if (!pageData.first) {
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${pageData.number - 1})">
                        이전
                    </a>
                </li>
            `;
        }

        // 페이지 번호
        for (let i = 0; i < pageData.totalPages; i++) {
            html += `
                <li class="page-item ${i === pageData.number ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${i})">
                        ${i + 1}
                    </a>
                </li>
            `;
        }

        // 다음 버튼
        if (!pageData.last) {
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${pageData.number + 1})">
                        다음
                    </a>
                </li>
            `;
        }

        $("#pagination").html(html);
    }

    // 상세 조회 페이지로 이동
    function goDetail(formId) {
        location.href = `/admin/approval/viewAppForm/${formId}`;
    }

    // 수정 페이지로 이동
    function goEdit(formId) {
        location.href = `/admin/approval/editAppForm/${formId}`;
    }

    // 결재선 서식 목록 조회
    function loadLineTemplates(){
        $.get(
            '/admin/approval/appLineTemplates',

            function(data){

                let html = '';

                data.forEach(item => {

                    html += `
                        <label class="list-group-item">

                            <input
                                type="radio"
                                name="lineTemplate"
                                value="${item.templateId}"
                                class="form-check-input me-2"
                                
                                ${
                                    Number(selectedTemplateId)
                                    === item.templateId
                                    ? 'checked'
                                    : ''
                                }>

                            ${item.templateName}

                            ${
                                item.isDefault
                                ? '<span class="badge bg-primary ms-2">기본</span>'
                                : ''
                            }

                        </label>
                    `;
                });

                $('#lineTemplateList').html(html);

                // 현재 연결된 결재선 서식 preview 자동 출력
                if(selectedTemplateId){
                    $(
                        `input[name="lineTemplate"][value="${selectedTemplateId}"]`
                    ).trigger('change');
                }
            }
        );
    }

    // modal 오픈 이벤트
    $(document).on(
        'click',
        '.open-line-modal',
        function (e) {
            console.log("결재선 설정 버튼 클릭");

            e.preventDefault();
            e.stopPropagation();

            currentFormId = $(this).data('form-id'); // 
            selectedTemplateId = $(this).data('line-template-id'); // 선택된 결재선 서식 id 

            loadLineTemplates();

            const modal =
                new bootstrap.Modal(
                    document.getElementById('lineTemplateModal')
                );

            modal.show();
        }
    );

    // 결재선 서식의 상세 미리보기 렌더링
    function renderLineTemplatePreview(detail){
        let html = '';

        html += `
            <h5>${detail.templateName}</h5>
        `;

        detail.steps.forEach(step => {

            html += `
                <div class="card mb-2">

                    <div class="card-header">

                        ${
                            step.stepOrder === 0
                            ? '참조'
                            : `${step.stepOrder}단계`
                        }

                    </div>

                    <div class="card-body">
            `;

            step.targets.forEach(target => {

                let label = '';

                // 사용자
                if(target.type === 'USER'){

                    label = `
                        ${target.dept}
                        / ${target.position}
                        / ${target.name}
                        (${target.id})
                    `;
                }
                // if(target.type === 'USER'){
                //     label = `
                //         ${target.departmentName}
                //         / ${target.positionName}
                //         / ${target.targetName}
                //         (${target.empNo})
                //     `;
                // }

                // 부서
                else if(target.type === 'DEPT'){

                    label = target.name;
                }

                // 직급
                else if(target.type === 'POSITION'){

                    label = target.name;
                }

                html += `
                    <span class="badge bg-primary me-1 mb-1">

                        ${label}

                    </span>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        $('#lineTemplatePreview').html(html);
    }

    // 결재선 서식 선택 변경 이벤트
    $(document).on(
        'change',
        'input[name="lineTemplate"]',
        function(){
            const templateId = $(this).val();
            $.get(
                `/admin/approval/appLineFormDetailData/${templateId}`,

                function(detail){
                    console.log(detail);
                    renderLineTemplatePreview(detail);
                }
            );
        }
    );

    // 결재 서식에 결재선 서식 연결 저장
    $('#saveLineTemplateBtn').on(
        'click',
        function(){
            const templateId =
                $('input[name="lineTemplate"]:checked')
                    .val();

            if(!templateId){
                alert('결재선을 선택하세요.');
                return;
            }

            $.ajax({
                url: `/admin/approval/appForms/${currentFormId}/lineTemplate`,
                type: 'PUT',

                data: {
                    templateId: templateId
                },

                success: function(){
                    alert('결재선 적용 완료');
                    $('#lineTemplateModal').modal('hide');
                    location.reload();
                }
            });
        }
    );
</script>

<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
