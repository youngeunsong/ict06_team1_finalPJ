<!doctype html>
<html xmlns:th="http://www.thymleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">전자 결재 서식 수정</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--전자결재용 서브 헤더 시작-->
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>
        <!--전자결재용 서브 헤더 끝-->
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>전자 결재 서식 수정</h3>
                </div>
                <!-- end::Row-->
                <!-- begin::Row-->
                <div class="row">
                    <!-- 왼쪽: 컴포넌트 라이브러리 시작-->
                    <div class="col-md-3">
                        <div class="card p-3">
                            <h5>필드 추가하기</h5>
                            <button class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('text')">
                                <i class="fa-solid fa-t"></i>
                                단일 텍스트
                            </button>
                            <button class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('number')">
                                <i class="fa-solid fa-hashtag"></i>
                                숫자
                            </button>
                            <button class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('date')">
                                <i class="fa-solid fa-calendar-days"></i>
                                날짜 선택
                            </button>
                            <button class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('time')">
                                <i class="fa-solid fa-clock"></i>
                                시간
                            </button>
                            <button class="btn btn-outline-secondary mb-2 text-start border-0 shadow-none" onclick="addField('amount')">
                                <i class="fa-solid fa-won-sign"></i>
                                금액
                            </button>
                        </div>
                    </div>
                    <!-- 왼쪽: 컴포넌트 라이브러리 끝-->
                    <!-- 오른쪽: 폼 캔버스 (미리보기 및 편집) 시작 -->
                    <div class="col-md-9">
                        <form id="formUpdateEditor">
                            <div class="card p-4">
                                <h5 class="card-header">서식 미리보기</h5>
                                <span>⭐로 표시된 곳은 필수로 작성 혹은 선택해주세요</span>
                                <!-- 기본 정보 (고정) -->
                                <div class="mb-4 border-bottom pb-3 text-center">
                                    <input type="text" name="formTitle" id="formTitle" class="form-control form-control-lg text-center border-0 shadow-none"
                                           placeholder="⭐서식 제목을 입력하세요 (예: 연차 신청서)" required th:value="${form.formName}">
                                </div>

                                <!-- 동적 필드가 추가될 영역 시작 -->
                                <div id="dynamicFields">
                                    <!-- JS로 필드가 삽입됩니다 -->
                                </div>
                                <!-- 동적 필드가 추가될 영역 끝 -->

                                <script th:inline="javascript">
                                    document.addEventListener("DOMContentLoaded", function () {

                                        const template = JSON.parse(/*[[${form.template}]]*/ '{}');
                                        console.log("template:", template);

                                        loadTemplate(template);
                                    });
                                </script>

                                <!-- 첨부 파일 사용 필수 여부 시작 -->
                                <div class="mb-4 border-bottom pb-3 text-center">
                                    <div class="d-flex align-items-center gap-3">
                                        <label class="col-md-auto">⭐<i class="fa-solid fa-cloud-arrow-up"></i>첨부파일</label>
                                        <select class="form-select" aria-label="Default select example" id="isFileRequired" required>
                                            <option value="" selected>선택해주세요</option>
                                            <option value="no">사용 안 함</option>
                                            <option value="yes">필수 사용</option>
                                        </select>
                                    </div>
                                </div>
                                <!-- 첨부 파일 사용 필수 여부 끝 -->
                            </div>

                            <!-- 목록, 수정, 삭제 버튼 바 시작 -->
                            <br>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/approval/viewForm/{id}(id=${form.formId})}" class="btn btn-secondary">돌아가기</a>
                                <button type="submit" id="" class="btn btn-primary">수정 완료</button>
                                <button type="button" class="btn btn-danger btn-sm" th:onclick="|deleteForm(${form.formId})|">삭제</button> <!-- 타임리프에서 js 함수 쓰는 방법 -->
                            </div>
                            <!-- 목록, 수정, 삭제 버튼 바 끝 -->
                        </form>
                    </div>
                    <!-- 오른쪽: 폼 캔버스 (미리보기 및 편집) 끝 -->     
                </div>
                <!-- end::Row-->
                
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 시작 -->
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> 
<!-- 템플릿 추가: 동적 필드 추가 메서드 활용 -->
<script src="/js/approval/createTemplate.js"></script>  
<script src="/js/approval/deleteForm.js"></script> <!-- 서식 삭제 함수 -->
<script th:inline="javascript">
    const formId = /*[[${form.formId}]]*/ 0; // Thymeleaf로 주입

    // DB에 저장된 값을 html 형식으로 변경 
    function loadTemplate(template) {

        // 1. 제목 세팅
        $('#formTitle').val(template.title);

        // 2. 기존 필드 초기화
        fields = [];
        $('#dynamicFields').empty();

        // 3. 필드 복원
        template.fields.forEach(field => {
            addField(field.type, field.label, field.placeholder);
        });

        // 4. 파일 여부
        $('#isFileRequired').val(template.fileRequired ? 'yes' : 'no');
    }

    // submit 버튼 누르면 DB에 수정할 최종 json 도출 후 컨트롤러에 전달
    $('#formUpdateEditor').on('submit', function (e) {
        e.preventDefault(); // 🔥 기본 submit 막기

        // 서식 제목, 첨부파일 필수 여부 설정 가져오기
        let formData = {
            title: $('#formTitle').val(),
            fields: [],
            fileRequired: $('#isFileRequired').val() === 'yes'
        };


        // DOM 기준으로 직접 수집
        $('#dynamicFields .field-item').each(function () {

            const field = $(this);

            const id = field.data('id');              // data-id
            const type = field.data('type');          // data-type
            const label = field.find('.field-label').val();
            const input = field.find('.field-placeholder');
            const placeholder = input.attr('placeholder') || '';

            formData.fields.push({
                id: id,
                type: type,
                label: label,
                placeholder: placeholder
            });
        });

        console.log("전송 JSON:", formData);

        // Ajax 방식으로 보내기
        $.ajax({
            url: `/admin/approval/update/${formId}`,
            type: 'PUT',
            contentType: 'application/json; charset=UTF-8',
            data: JSON.stringify({
                formId : formId, 
                formName: formData.title,
                template: JSON.stringify(formData) // DB에는 문자열로 저장
            }),
            success: function () {
                alert("성공적으로 수정됐습니다.");
                location.href = "/admin/approval/viewForm/" + formId; // 수정 성공 시 서식 목록으로 돌아가기
            },
            error: function (err) {
                console.error('에러:', err);
                alert("수정 실패");
            }
        });
    });
</script>
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
