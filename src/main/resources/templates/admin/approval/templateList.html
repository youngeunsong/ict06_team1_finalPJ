<!doctype html>
<html xmlns:th="http://www.thymleaf.org">
<!--begin::Head-->
<head th:insert="/admin/common/head.html :: common_header">
    <title id="page_title">전자 결재 서식 관리 메인</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>전자 결재 서식 관리 메인</h3>
                </div>
                <!-- end::Row-->
                <!--새 서식 추가 버튼 시작-->
                <div class="row">
                    <div class="d-flex flex-row-reverse">
                        <button type="button" class="btn btn-success" th:onclick="|location.href='@{/admin/approval/createTemplate}'|">
                            (+) 새 서식 추가
                        </button>
                    </div>
                </div>
                <!--새 서식 추가 버튼 끝-->
                <br>
                <!-- begin::서식 표 시작-->
                <div class="row">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>✅</th>
                                <th>서식 번호</th>
                                <th>서식 명</th>
                                <th>최종 수정일</th>
                                <th>관리</th> <!-- 수정, 삭제 버튼-->
                            </tr>
                        </thead>

                        <tbody id="tableBody">
                        <!-- JS로 채우기 -->
                        </tbody>
                    </table>
                </div>
                <!-- end::서식 표 끝-->
                <!-- 페이징 코드 시작-->
                <div class="d-flex justify-content-center">
                    <nav>
                        <ul class="pagination" id="pagination">
                            <!-- JS로 생성 -->
                        </ul>
                    </nav>
                </div>
                <!-- 페이징 코드 끝 -->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->

<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> <!-- jQuery -->

<script>
    // [Ajax + 렌더링 js]
    let currentPage = 0;
    const pageSize = 10;

    // 최초 로딩
    $(document).ready(function () {
        loadPage(0);
    });

    // 데이터 조회
    function loadPage(page) {
        $.ajax({
            url: "/admin/approval/getAppForms",
            type: "GET",
            data: {
                page: page,
                size: pageSize
            },
            success: function (data) {
                renderTable(data.content);
                renderPagination(data);
                currentPage = page;
            },
            error: function () {
                alert("데이터 조회 실패");
            }
        });
    }

    // [테이블 렌더링]
    function renderTable(list) {
        let html = "";

        list.forEach(item => {
            let createdAt = new Date(item.updatedAt).toLocaleString();
            // event.stopPropagation() : 버튼 클릭 시 row 클릭 이벤트 방지
            html += `
                <tr onclick="goDetail(${item.formId})" style="cursor:pointer;">
                    <td><input type="checkbox" class="form-check-input" onclick="event.stopPropagation()"></td>
                    <td>${item.formId}</td>
                    <td>${item.formName}</td>
                    <td>${createdAt ?? ''}</td>
                    <td>
                        <button class="btn btn-primary btn-sm"
                            onclick="goEdit(${item.formId})">
                            수정
                        </button>
                        <button class="btn btn-danger btn-sm">삭제</button>
                    </td>
                </tr>
            `;
        });

        $("#tableBody").html(html);
    }

    // 페이지 렌더링
    function renderPagination(pageData) {
        let html = "";

        // 이전 버튼
        if (!pageData.first) {
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${pageData.number - 1})">
                        이전
                    </a>
                </li>
            `;
        }

        // 페이지 번호
        for (let i = 0; i < pageData.totalPages; i++) {
            html += `
                <li class="page-item ${i === pageData.number ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${i})">
                        ${i + 1}
                    </a>
                </li>
            `;
        }

        // 다음 버튼
        if (!pageData.last) {
            html += `
                <li class="page-item">
                    <a class="page-link" href="javascript:void(0)" onclick="loadPage(${pageData.number + 1})">
                        다음
                    </a>
                </li>
            `;
        }

        $("#pagination").html(html);
    }

    // 상세 조회 페이지로 이동
    function goDetail(formId) {
        location.href = `/admin/approval/viewForm/${formId}`;
    }

    // 수정 페이지로 이동
    function goEdit(formId) {
        location.href = `/admin/approval/edit/${formId}`;
    }
</script>

<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
