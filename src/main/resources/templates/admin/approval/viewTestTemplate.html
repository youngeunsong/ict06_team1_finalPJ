<!--
[생성된 서식 테스트]
생성된 서식이 정상적으로 보이는 지 확인하기 위한 페이지입니다.
-->
<!doctype html>
<html xmlns:th="http://www.thymleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">테스트 템플릿</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>새 전자결재 서식 만들기</h3>
                </div>
                <!-- end::Row-->
                <!-- begin::Row-->
                <div class="row">
                    <!-- 생성한 서식 첨부 영역 시작 -->
                    <div class="mb-4 border-bottom pb-3 text-center">
                        <h3>"test3"</h3>
                    </div>
                    <div class="mb-3">
                        <label for="formFile" class="form-label">파일을 첨부해주세요</label>
                        <input class="form-control" type="file" id="formFile">
                    </div>
                    <!-- 생성한 서식 첨부 영역 끝 -->
                </div>
                <!-- end::Row-->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
