<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">결재선 서식 상세</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--전자결재용 서브 헤더 시작-->
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>
        <!--전자결재용 서브 헤더 끝-->
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>결재선 서식 상세</h3>
                </div>
                <!-- end::Row-->
                <!-- 결재선 서식 상세 내용 시작-->
                <div class="card p-3">
                    <h3 th:text="${detail.templateName}"></h3>
                    <div th:each="step : ${detail.steps}" class="mb-3">
                        <h5 th:text="${step.stepOrder == 0 ? '참조' : step.stepOrder + '단계'}"></h5>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge bg-primary"
                                  th:each="target : ${step.targets}"
                                  th:text="${target.type == 'USER'}
                                  ? ${target.departmentName + ' · ' + target.positionName + ' · ' + target.targetName + '(' + target.empNo + ')'}
                                  : ${target.targetName}">
                            </span>
                        </div>
                    </div>
                </div>
                <!-- 결재선 서식 상세 내용 끝-->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
