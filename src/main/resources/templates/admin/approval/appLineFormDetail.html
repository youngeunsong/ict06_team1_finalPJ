<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <title id="page_title">결재선 서식 상세</title>    <!-- 해당 페이지별 사용할 title 내용 넣기 -->
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작-->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝-->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--전자결재용 서브 헤더 시작-->
        <th:block th:replace="~{/admin/approval/appFormNav}"></th:block>
        <!--전자결재용 서브 헤더 끝-->
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <br>
                <!-- begin::Row-->
                <div class="row">
                    <h3>결재선 서식 상세</h3>
                </div>
                <!-- end::Row-->
                <!-- 결재선 서식 상세 내용 시작-->
                <div class="card p-3">
                    <h3 th:text="${detail.templateName}"></h3>
                    <div th:each="step : ${detail.steps}" class="mb-3">
                        <h5 th:text="${step.stepOrder == 0 ? '참조' : step.stepOrder + '단계'}"></h5>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge bg-primary"
                                  th:each="target : ${step.targets}"
                                  th:text="${target.type == 'USER'}
                                  ? ${target.dept + ' · ' + target.position + ' · ' + target.name + '(' + target.id + ')'}
                                  : ${target.name}">
                            </span>
<!--                            ? ${target.departmentName + ' · ' + target.positionName + ' · ' + target.targetName + '(' + target.empNo + ')'}-->
                        </div>
                    </div>
                    <!--기본 결재선 여부 시작 isDefault-->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:checked="${detail.isDefault}" id="checkDefault" th:disabled="${true}">
                        <label class="form-check-label" for="checkDefault">
                            기본 결재선
                        </label>
                    </div>
                    <!--기본 결재선 여부 끝-->
                </div>
                <!-- 결재선 서식 상세 내용 끝-->
                <!-- 목록, 수정, 삭제 버튼 바 시작 -->
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/approval/appLineFormList}" class="btn btn-secondary">목록</a>

                    <a th:href="@{/admin/approval/editAppLineForm/{templateId}(templateId=${detail.templateId})}"
                       class="btn btn-primary">
                        수정
                    </a>
                    <button type="button" class="btn btn-danger btn-sm" th:onclick="|deleteAppLineForm(${detail.templateId})|">삭제</button> <!-- 타임리프에서 js 함수 쓰는 방법 -->
                </div>
                <!-- 목록, 수정, 삭제 버튼 바 끝 -->
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->
    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!--스크립트 시작-->
<th:block th:replace="~{/admin/common/commonJs}"></th:block> <!-- 공통 사용 스크립트 불러오기-->
<!-- 각 페이지 별로 필요한 스크립트 작성 혹은 임포트 -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script> <!-- jQuery -->
<script src="/js/approval/deleteAppLineForm.js"></script> <!-- 결재선 서식 삭제 js -->
<!--스크립트 끝-->
</body>
<!--end::Body-->
</html>
