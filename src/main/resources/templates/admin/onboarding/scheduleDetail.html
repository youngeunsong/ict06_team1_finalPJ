    @Date : 2026. 05. 12
    @Modification_History
    @
    @ 수정일자        수정자        수정내용
    @ ----------    ---------    -------------------------------
    @ 2026.05.12    김다솜        최초 생성 및 직원별 학습목록 관리 화면 구현
    @ 2026.05.18    김다솜        학습항목 수동 알림 발송 연결 및 사원-콘텐츠별 알림 이력 표시 추가
-->
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/admin/common/head.html :: common_header}">
    <meta charset="UTF-8">
    <title id="page_title">학습 목록 관리</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid p-4" style="max-width: 1000px; margin: 0 auto;">
                <div class="mb-4">
                    <a th:href="@{/admin/onboarding/schedules}" class="text-decoration-none small text-muted">
                        <i class="fa-solid fa-chevron-left me-1"></i> 목록으로 돌아가기
                    </a>
                    <h3 class="mt-2" th:text="|${employeeName}님의 학습 목록|">직원 학습 목록</h3>
                    <p class="text-muted">배정된 온보딩 항목의 진행 상태와 일정을 관리합니다.</p>
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">카테고리</th>
                                <th>학습 항목</th>
                                <th>콘텐츠</th>
                                <th>기간</th>
                                <th class="text-center">상태</th>
                                <th style="min-width: 260px;">알림 발송 이력</th>
                                <th class="text-center pe-4">관리</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${items}">
                                <td class="ps-4" th:text="${item.categoryName}">카테고리</td>
                                <td class="fw-semibold" th:text="${item.itemTitle}">학습 항목</td>
                                <td class="text-muted small" th:text="${item.contentTitle}">콘텐츠</td>
                                <td>
                                    <span th:text="${item.startDate}">-</span> ~ 
                                    <span th:text="${item.dueDate}">-</span>
                                </td>
                                <td class="text-center">
                                    <!-- 상태 필드 배지 색상 구분 로직 -->
                                    <span class="badge" 
                                          th:classappend="${item.status == 'COMPLETED' ? 'bg-success' : (item.status == 'IN_PROGRESS' ? 'bg-primary' : 'bg-secondary')}"
                                          th:text="${item.status}">
                                        STATUS
                                    </span>
                                </td>
                                <td>
                                    <div th:if="${#lists.isEmpty(item.notificationHistories)}"
                                         class="small text-muted">
                                        발송 이력 없음
                                    </div>
                                    <div th:unless="${#lists.isEmpty(item.notificationHistories)}"
                                         class="d-flex flex-column gap-1">
                                        <div th:each="history : ${item.notificationHistories}"
                                             class="small border rounded-3 px-2 py-1 bg-light">
                                            <div class="d-flex justify-content-between gap-2">
                                                <span class="fw-semibold text-truncate" th:text="${history.title}">알림 제목</span>
                                                <span class="text-muted text-nowrap"
                                                      th:text="${history.createdAt != null ? #temporals.format(history.createdAt, 'MM-dd HH:mm') : '-'}">05-18 09:00</span>
                                            </div>
                                            <div class="text-muted text-truncate" th:text="${history.content}">알림 내용</div>
                                            <span class="badge mt-1"
                                                  th:classappend="${history.isRead == true ? ' bg-success' : ' bg-secondary'}"
                                                  th:text="${history.isRead == true ? '읽음' : '미읽음'}">미읽음</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center pe-4">
                                    <div class="d-flex justify-content-center gap-1">
                                        <a th:href="@{/admin/onboarding/roadmaps/{rid}/items/{iid}/edit(rid=${item.roadmapId}, iid=${item.itemId})}" 
                                           class="btn btn-xs btn-outline-primary">수정</a>
                                        <form th:action="@{/admin/onboarding/schedules/{empNo}/items/{itemId}/notify(empNo=${empNo}, itemId=${item.itemId})}"
                                              method="post"
                                              class="d-inline">
                                            <button type="submit"
                                                    class="btn btn-xs btn-outline-warning"
                                                    onclick="return confirm('해당 학습 콘텐츠 알림을 발송하시겠습니까?');">
                                                <i class="fa-solid fa-bell"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(items)}">
                                <td colspan="7" class="text-center text-muted py-5">배정된 학습 항목이 없습니다.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
</html>
