<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<!--begin::Head-->
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title" th:text="${isEdit} ? '온보딩 로드맵 수정' : '온보딩 로드맵 등록'">온보딩 로드맵 등록</title>
</head>
<!--end::Head-->
<!--begin::Body-->
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<!--begin::App Wrapper-->
<div class="app-wrapper">
    <!-- 헤더 시작 -->
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <!-- 헤더 끝 -->

    <!-- 사이드바 시작 -->
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>
    <!-- 사이드바 끝 -->

    <!-- 메인 콘텐츠 시작 -->
    <main class="app-main">
        <!--begin::App Content-->
        <div class="app-content">
            <!--begin::Container-->
            <div class="container-fluid">
                <!-- 페이지 제목 영역 -->
                <div class="row mb-3">
                    <div class="col">
                        <h3 th:text="${isEdit} ? '온보딩 로드맵 수정' : '온보딩 로드맵 등록'">온보딩 로드맵 등록</h3>
                        <p class="text-muted mb-0">
                            사원별 온보딩 로드맵 기본 정보를 등록하거나 수정합니다.
                        </p>
                    </div>
                </div>

                <!-- 로드맵 등록/수정 폼 영역 -->
                <form th:action="${isEdit} ? @{/admin/onboarding/roadmaps/{id}/edit(id=${roadmap.roadmapId})} : @{/admin/onboarding/roadmaps}"
                      method="post">
                    <div class="card">
                        <div class="card-header">
                            <strong>로드맵 기본 정보</strong>
                        </div>

                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">대상 사원</label>
                                    <input type="text"
                                           id="employeeSearch"
                                           class="form-control mb-2"
                                           placeholder="사번, 이름, 부서, 직급으로 검색"
                                           th:disabled="${isEdit}">
                                    <div id="employeeSearchResult"
                                         class="list-group mb-2"
                                         style="max-height: 180px; overflow-y: auto;"></div>
                                    <select name="empNo" id="employeeSelect" class="form-select" th:disabled="${isEdit}" required>
                                        <option value="">선택</option>
                                        <option th:each="employee : ${employees}"
                                                th:value="${employee.empNo}"
                                                th:text="|${employee.empNo} - ${employee.name} - ${employee.department != null ? employee.department.deptName : '-'} - ${employee.position != null ? employee.position.positionName : '-'}|"
                                                th:attr="data-search=|${employee.empNo} ${employee.name} ${employee.department != null ? employee.department.deptName : ''} ${employee.position != null ? employee.position.positionName : ''}|"
                                                th:selected="${roadmap.employee != null and roadmap.employee.empNo == employee.empNo}">
                                        </option>
                                    </select>
                                    <input th:if="${isEdit}" type="hidden" name="empNo" th:value="${roadmap.employee.empNo}">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">생성 타입</label>
                                    <select name="generatedType" class="form-select" required>
                                        <option value="">선택</option>
                                        <option th:each="generatedType : ${generatedTypes}"
                                                th:value="${generatedType}"
                                                th:text="${generatedType}"
                                                th:selected="${roadmap.generatedType != null and roadmap.generatedType == generatedType}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 버튼 영역 -->
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a th:href="@{/admin/onboarding/roadmaps}" class="btn btn-outline-secondary">
                            목록으로
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? '수정' : '저장'">저장</span>
                        </button>
                    </div>
                </form>
            </div>
            <!--end::Container-->
        </div>
        <!--end::App Content-->
    </main>
    <!-- 메인 콘텐츠 끝 -->

    <!-- 푸터 시작 -->
    <th:block th:replace="~{/admin/common/footer}"></th:block>
    <!-- 푸터 끝 -->
</div>
<!--end::App Wrapper-->
<!-- 스크립트 시작 -->
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('employeeSearch');
        const employeeSelect = document.getElementById('employeeSelect');

        if (!searchInput || !employeeSelect) {
            return;
        }

        const resultBox = document.getElementById('employeeSearchResult');

        if (searchInput.disabled) {
            if (resultBox) {
                resultBox.classList.add('d-none');
            }
            return;
        }

        const options = Array.from(employeeSelect.options);

        function normalize(text) {
            return (text || '').replace(/\s+/g, '').toLowerCase();
        }

        function updateSelectOptions(keyword) {
            options.forEach(function (option) {
                if (!option.value) {
                    option.hidden = false;
                    return;
                }

                const searchText = normalize(option.dataset.search || option.textContent);
                option.hidden = keyword && !searchText.includes(keyword);
            });
        }

        function selectEmployee(option) {
            employeeSelect.value = option.value;
            searchInput.value = option.textContent.trim();
            employeeSelect.setCustomValidity('');
            employeeSelect.dispatchEvent(new Event('change', { bubbles: true }));
            resultBox.innerHTML = '';
        }

        function renderSearchResults() {
            const keyword = searchInput.value.replace(/\s+/g, '').toLowerCase();
            updateSelectOptions(keyword);

            if (!resultBox) {
                return;
            }

            resultBox.innerHTML = '';

            if (!keyword) {
                const emptyMessage = document.createElement('div');
                emptyMessage.className = 'list-group-item text-muted';
                emptyMessage.textContent = '검색어를 입력하면 후보가 표시됩니다.';
                resultBox.appendChild(emptyMessage);
                return;
            }

            const matchedOptions = options
                .filter(function (option) {
                    return option.value && !option.hidden;
                })
                .slice(0, 20);

            if (matchedOptions.length === 0) {
                const noResultMessage = document.createElement('div');
                noResultMessage.className = 'list-group-item text-muted';
                noResultMessage.textContent = '검색 결과가 없습니다.';
                resultBox.appendChild(noResultMessage);
                return;
            }

            matchedOptions.forEach(function (option) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'list-group-item list-group-item-action';
                button.textContent = option.textContent.trim();
                button.addEventListener('click', function () {
                    selectEmployee(option);
                });
                resultBox.appendChild(button);
            });

            const selectedOption = employeeSelect.options[employeeSelect.selectedIndex];
            if (selectedOption && selectedOption.hidden) {
                employeeSelect.value = '';
            }
        }

        searchInput.addEventListener('input', renderSearchResults);
        renderSearchResults();
    });
</script>
<!-- 스크립트 끝 -->
</body>
<!--end::Body-->
</html>
