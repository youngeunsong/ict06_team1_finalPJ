<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title" th:text="${isEdit} ? '문서 수정' : '문서 등록'">문서 등록</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3 th:text="${isEdit} ? '문서 수정' : '문서 등록'">문서 등록</h3>
                        <p class="text-muted mb-0">온보딩 문서와 RAG 대상 문서의 메타데이터를 관리합니다.</p>
                    </div>
                </div>

                <form th:action="${isEdit} ? @{/admin/onboarding/documents/{id}/edit(id=${documentId})} : @{/admin/onboarding/documents}" method="post">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="card mb-3">
                                <div class="card-header"><strong>기본 정보</strong></div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">문서명</label>
                                        <input type="text" name="title" class="form-control" th:value="${document.title}" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">문서 경로</label>
                                        <input type="text" name="filePath" class="form-control" th:value="${document.filePath}" placeholder="/files/onboarding/guide.pdf" required>
                                        <div class="form-text">실제 접근 가능한 경로 또는 문서 URL을 입력합니다. 저장 후 자동으로 체크 및 벡터 처리를 시도합니다.</div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">관련 콘텐츠</label>
                                        <select id="relatedContentSelect" class="form-select">
                                            <option value="">관련 콘텐츠 선택</option>
                                            <option th:each="content : ${contents}"
                                                    th:value="${content.contentId}"
                                                    th:attr="data-title=${content.title},data-category=${content.category != null ? content.category : '-'}"
                                                    th:text="${'[' + (content.category != null ? content.category : '-') + '] ' + content.title}">
                                            </option>
                                        </select>
                                        <div class="form-text">선택하면 아래 목록에 추가됩니다. 같은 문서를 여러 학습 콘텐츠와 연결할 수 있습니다.</div>

                                        <div id="selectedContentList" class="list-group mt-3">
                                            <div th:each="content : ${contents}"
                                                 th:if="${document.contentIds != null and #lists.contains(document.contentIds, content.contentId)}"
                                                 class="list-group-item d-flex align-items-center justify-content-between gap-3"
                                                 th:attr="data-content-id=${content.contentId}">
                                                <div>
                                                    <input type="hidden" name="contentIds" th:value="${content.contentId}">
                                                    <div class="fw-semibold" th:text="${content.title}">콘텐츠명</div>
                                                    <div class="small text-muted" th:text="${content.category != null ? content.category : '-'}">카테고리</div>
                                                </div>
                                                <button type="button" class="btn btn-sm btn-outline-danger remove-content-button" aria-label="관련 콘텐츠 삭제">&times;</button>
                                            </div>
                                        </div>

                                        <div id="emptySelectedContent" class="text-muted small mt-2"
                                             th:classappend="${document.contentIds != null and !document.contentIds.isEmpty()} ? ' d-none'">
                                            연결된 관련 콘텐츠가 없습니다.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card mb-3">
                                <div class="card-header"><strong>운영 정보</strong></div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">대상 부서</label>
                                        <select name="deptId" class="form-select">
                                            <option value="">공통 문서</option>
                                            <option th:each="department : ${departments}"
                                                    th:value="${department.deptId}"
                                                    th:selected="${document.deptId != null and document.deptId == department.deptId}"
                                                    th:text="${department.parentDept != null ? department.parentDept.deptName + ' > ' + department.deptName : department.deptName}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">접근 권한</label>
                                        <select name="accessLevel" class="form-select" required>
                                            <option value="">선택</option>
                                            <option th:each="accessLevel : ${accessLevels}"
                                                    th:value="${accessLevel}"
                                                    th:selected="${document.accessLevel != null and document.accessLevel.name() == accessLevel.name()}"
                                                    th:text="${accessLevel}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">처리 단계</label>
                                        <input type="hidden" name="currentStage" th:value="${document.currentStage}">
                                        <div class="form-control bg-body-secondary">
                                            <span th:text="${document.currentStage != null ? document.currentStage : 'UPLOADED'}">UPLOADED</span>
                                        </div>
                                        <div class="form-text">
                                            처리 단계는 시스템이 자동으로 관리합니다. 등록 및 자동 처리 결과에 따라 단계가 변경됩니다.
                                        </div>
                                    </div>

                                    <div th:if="${isEdit}" class="small text-muted">
                                        등록자: <span th:text="${createdByName}">-</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/admin/onboarding/documents}" class="btn btn-outline-secondary">목록으로</a>
                        <button type="submit" class="btn btn-primary" th:text="${isEdit} ? '수정' : '등록'">등록</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script>
    (() => {
        const select = document.getElementById('relatedContentSelect');
        const list = document.getElementById('selectedContentList');
        const emptyMessage = document.getElementById('emptySelectedContent');

        const syncEmptyMessage = () => {
            emptyMessage.classList.toggle('d-none', list.children.length > 0);
        };

        const bindRemoveButton = (button) => {
            button.addEventListener('click', () => {
                button.closest('[data-content-id]').remove();
                syncEmptyMessage();
            });
        };

        document.querySelectorAll('.remove-content-button').forEach(bindRemoveButton);

        select.addEventListener('change', () => {
            const option = select.selectedOptions[0];
            const contentId = option.value;
            if (!contentId || list.querySelector(`[data-content-id="${contentId}"]`)) {
                select.value = '';
                return;
            }

            const item = document.createElement('div');
            item.className = 'list-group-item d-flex align-items-center justify-content-between gap-3';
            item.dataset.contentId = contentId;
            item.innerHTML = `
                <div>
                    <input type="hidden" name="contentIds" value="${contentId}">
                    <div class="fw-semibold"></div>
                    <div class="small text-muted"></div>
                </div>
                <button type="button" class="btn btn-sm btn-outline-danger remove-content-button" aria-label="관련 콘텐츠 삭제">&times;</button>
            `;
            item.querySelector('.fw-semibold').textContent = option.dataset.title || option.textContent;
            item.querySelector('.small').textContent = option.dataset.category || '-';
            bindRemoveButton(item.querySelector('.remove-content-button'));
            list.appendChild(item);
            select.value = '';
            syncEmptyMessage();
        });

        syncEmptyMessage();
    })();
</script>
</body>
</html>
