<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title" th:text="${isEdit} ? '문서 수정' : '문서 등록'">문서 등록</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3 th:text="${isEdit} ? '문서 수정' : '문서 등록'">문서 등록</h3>
                        <p class="text-muted mb-0">온보딩 문서와 RAG 대상 문서의 메타데이터를 관리합니다.</p>
                    </div>
                </div>

                <form th:action="${isEdit} ? @{/admin/onboarding/documents/{id}/edit(id=${documentId})} : @{/admin/onboarding/documents}" method="post">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="card mb-3">
                                <div class="card-header"><strong>기본 정보</strong></div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">문서명</label>
                                        <input type="text" name="title" class="form-control" th:value="${document.title}" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">문서 경로</label>
                                        <input type="text" name="filePath" class="form-control" th:value="${document.filePath}" placeholder="/files/onboarding/guide.pdf" required>
                                        <div class="form-text">실제 접근 가능한 경로나 문서 URL을 입력합니다. 저장 후 자동으로 청크 및 벡터 처리를 시도합니다.</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card mb-3">
                                <div class="card-header"><strong>운영 정보</strong></div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">대상 부서</label>
                                        <select name="deptId" class="form-select">
                                            <option value="">공통 문서</option>
                                            <option th:each="department : ${departments}"
                                                    th:value="${department.deptId}"
                                                    th:selected="${document.deptId != null and document.deptId == department.deptId}"
                                                    th:text="${department.parentDept != null ? department.parentDept.deptName + ' > ' + department.deptName : department.deptName}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">접근 권한</label>
                                        <select name="accessLevel" class="form-select" required>
                                            <option value="">선택</option>
                                            <option th:each="accessLevel : ${accessLevels}"
                                                    th:value="${accessLevel}"
                                                    th:selected="${document.accessLevel != null and document.accessLevel.name() == accessLevel.name()}"
                                                    th:text="${accessLevel}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">처리 단계</label>
                                        <input type="hidden" name="currentStage" th:value="${document.currentStage}">
                                        <div class="form-control bg-body-secondary">
                                            <span th:text="${document.currentStage != null ? document.currentStage : 'UPLOADED'}">UPLOADED</span>
                                        </div>
                                        <div class="form-text">
                                            처리 단계는 시스템이 자동으로 관리합니다. 등록 및 자동 처리 결과에 따라 단계가 변경됩니다.
                                        </div>
                                    </div>

                                    <div th:if="${isEdit}" class="small text-muted">
                                        등록자: <span th:text="${createdByName}">-</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/admin/onboarding/documents}" class="btn btn-outline-secondary">목록으로</a>
                        <button type="submit" class="btn btn-primary" th:text="${isEdit} ? '수정' : '등록'">등록</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
</html>
