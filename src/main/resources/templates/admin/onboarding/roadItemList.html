<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title">로드맵 아이템 관리</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3>로드맵 아이템 관리</h3>
                        <p class="text-muted mb-0">
                            <span th:text="${roadmap.title}">로드맵 제목</span>
                        </p>
                    </div>

                    <div class="col-auto ms-auto">
                        <a th:href="@{/admin/onboarding/roadmaps/{roadmapId}/items/new(roadmapId=${roadmap.roadmapId})}"
                           class="btn btn-primary btn-sm text-nowrap d-inline-flex align-items-center">
                            아이템 등록
                        </a>
                    </div>
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" class="form-control" id="roadItemSearchInput" placeholder="아이템 제목, 카테고리, 콘텐츠명 검색">
                            </div>
                            <div class="col-md-3">
                                <div class="border rounded p-2">
                                    <div class="small text-muted mb-1">콘텐츠 유형</div>
                                    <div class="d-flex flex-wrap gap-2" id="roadItemTypeFilterGroup"></div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select mb-2" id="roadItemSortOrder">
                                    <option value="order-asc">정렬: 순서 오름차순</option>
                                    <option value="order-desc">정렬: 순서 내림차순</option>
                                    <option value="title-asc">정렬: 아이템 제목 가나다순</option>
                                    <option value="category-asc">정렬: 카테고리 가나다순</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary w-100" id="roadItemFilterReset">초기화</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="alert alert-light border mb-3">
                    순서는 아래 화살표로 먼저 조정한 뒤, 마지막에 <strong>순서 저장</strong>을 눌러 한 번에 반영합니다.
                </div>

                <form th:action="@{/admin/onboarding/roadmaps/{roadmapId}/items/reorder(roadmapId=${roadmap.roadmapId})}"
                      method="post"
                      id="reorderForm">
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-hover align-middle" id="roadItemTable">
                                <thead>
                                <tr>
                                    <th>순서</th>
                                    <th>카테고리</th>
                                    <th>아이템 제목</th>
                                    <th>연결 콘텐츠</th>
                                    <th>콘텐츠 유형</th>
                                    <th>관리</th>
                                </tr>
                                </thead>

                                <tbody id="roadItemTableBody">
                                <tr th:each="item, itemStat : ${items}" th:attr="data-item-id=${item.itemId}" class="road-item-row">
                                    <td>
                                        <input type="hidden" name="itemIds" th:value="${item.itemId}">
                                        <input type="hidden" name="orderNos" th:value="${item.orderNo}" class="order-input">

                                        <div class="d-flex align-items-center gap-2">
                                            <span class="badge bg-secondary order-label" th:text="${item.orderNo}">1</span>
                                            <button type="button"
                                                    class="btn btn-sm btn-outline-secondary move-up"
                                                    th:disabled="${itemStat.first}">
                                                ▲
                                            </button>
                                            <button type="button"
                                                    class="btn btn-sm btn-outline-secondary move-down"
                                                    th:disabled="${itemStat.last}">
                                                ▼
                                            </button>
                                        </div>
                                    </td>
                                    <td th:text="${item.categoryName}" class="road-item-category">카테고리</td>
                                    <td th:text="${item.itemTitle}" class="road-item-title">아이템 제목</td>
                                    <td th:text="${item.content.title}" class="road-item-content">연결 콘텐츠</td>
                                    <td th:text="${item.content.type}" class="road-item-type">VIDEO</td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <a class="btn btn-sm btn-outline-primary"
                                               th:href="@{/admin/onboarding/roadmaps/{roadmapId}/items/{itemId}/edit(
                                                    roadmapId=${roadmap.roadmapId},
                                                    itemId=${item.itemId}
                                               )}">
                                                수정
                                            </a>
                                            <button type="submit"
                                                    class="btn btn-sm btn-outline-danger"
                                                    th:formaction="@{/admin/onboarding/roadmaps/{roadmapId}/items/{itemId}/delete(
                                                        roadmapId=${roadmap.roadmapId},
                                                        itemId=${item.itemId}
                                                    )}"
                                                    formmethod="post"
                                                    onclick="return confirm('아이템을 삭제하시겠습니까?');">
                                                삭제
                                            </button>
                                        </div>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(items)}">
                                    <td colspan="6" class="text-center text-muted">
                                        등록된 로드맵 아이템이 없습니다.
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-3 d-flex justify-content-between">
                        <a th:href="@{/admin/onboarding/roadmaps}" class="btn btn-outline-secondary">
                            로드맵 목록으로
                        </a>
                        <button type="submit"
                                class="btn btn-primary"
                                id="saveOrderButton"
                                th:disabled="${#lists.isEmpty(items)}"
                                disabled>
                            순서 저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const tbody = document.getElementById('roadItemTableBody');
        const saveButton = document.getElementById('saveOrderButton');

        if (!tbody || !saveButton) {
            return;
        }

        const filterRows = Array.from(document.querySelectorAll('#roadItemTable .road-item-row'));
        const searchInput = document.getElementById('roadItemSearchInput');
        const typeFilterGroup = document.getElementById('roadItemTypeFilterGroup');
        const sortOrder = document.getElementById('roadItemSortOrder');
        const resetButton = document.getElementById('roadItemFilterReset');
        const roadItemTableBody = document.getElementById('roadItemTableBody');

        const uniqueTypes = [...new Set(filterRows.map((row) => row.querySelector('.road-item-type')?.innerText.trim()).filter(Boolean))];
        typeFilterGroup.innerHTML = uniqueTypes.map((type, index) => `
            <div class="form-check">
                <input class="form-check-input road-item-type-filter" type="checkbox" value="${type}" id="roadItemType${index}">
                <label class="form-check-label" for="roadItemType${index}">${type}</label>
            </div>
        `).join('');
        const typeFilters = Array.from(document.querySelectorAll('.road-item-type-filter'));

        const sortRows = () => {
            const sortValue = sortOrder.value;
            const sortedRows = [...filterRows].sort((a, b) => {
                if (sortValue === 'order-asc' || sortValue === 'order-desc') {
                    const aOrder = Number(a.querySelector('.order-input')?.value || 0);
                    const bOrder = Number(b.querySelector('.order-input')?.value || 0);
                    return sortValue === 'order-asc' ? aOrder - bOrder : bOrder - aOrder;
                }

                if (sortValue === 'title-asc') {
                    return (a.querySelector('.road-item-title')?.innerText || '').localeCompare(b.querySelector('.road-item-title')?.innerText || '', 'ko');
                }

                if (sortValue === 'category-asc') {
                    return (a.querySelector('.road-item-category')?.innerText || '').localeCompare(b.querySelector('.road-item-category')?.innerText || '', 'ko');
                }

                return 0;
            });

            sortedRows.forEach((row) => roadItemTableBody.appendChild(row));
            refreshRows();
        };

        const refreshRows = () => {
            const rows = Array.from(tbody.querySelectorAll('tr[data-item-id]'));

            rows.forEach((row, index) => {
                const order = index + 1;
                row.querySelector('.order-label').textContent = order;
                row.querySelector('.order-input').value = order;

                const upButton = row.querySelector('.move-up');
                const downButton = row.querySelector('.move-down');

                upButton.disabled = index === 0;
                downButton.disabled = index === rows.length - 1;
            });
        };

        tbody.addEventListener('click', function (event) {
            const button = event.target.closest('button');

            if (!button || (!button.classList.contains('move-up') && !button.classList.contains('move-down'))) {
                return;
            }

            const row = button.closest('tr[data-item-id]');
            if (!row) {
                return;
            }

            if (button.classList.contains('move-up') && row.previousElementSibling) {
                tbody.insertBefore(row, row.previousElementSibling);
            }

            if (button.classList.contains('move-down') && row.nextElementSibling) {
                tbody.insertBefore(row.nextElementSibling, row);
            }

            refreshRows();
            saveButton.disabled = false;
        });

        const applyFilters = () => {
            const searchValue = searchInput.value.trim().toLowerCase();
            const typeValues = typeFilters.filter((checkbox) => checkbox.checked).map((checkbox) => checkbox.value);

            filterRows.forEach((row) => {
                const rowText = row.innerText.toLowerCase();
                const rowType = row.querySelector('.road-item-type')?.innerText.trim() || '';

                const matchesSearch = !searchValue || rowText.includes(searchValue);
                const matchesType = typeValues.length === 0 || typeValues.includes(rowType);

                row.style.display = matchesSearch && matchesType ? '' : 'none';
            });
        };

        [searchInput, sortOrder].forEach((element) => {
            element.addEventListener('input', applyFilters);
            element.addEventListener('change', applyFilters);
        });
        typeFilters.forEach((checkbox) => checkbox.addEventListener('change', applyFilters));
        sortOrder.addEventListener('change', sortRows);

        resetButton.addEventListener('click', function () {
            searchInput.value = '';
            typeFilters.forEach((checkbox) => { checkbox.checked = false; });
            sortOrder.value = 'order-asc';
            sortRows();
            applyFilters();
        });

        refreshRows();
        sortRows();
    });
</script>
</body>
</html>
