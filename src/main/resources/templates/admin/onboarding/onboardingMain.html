<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title">온보딩 메인</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3>온보딩 관리</h3>
                    </div>
                    <div class="col text-end">
                        <a th:href="@{/admin/onboarding/contents/new}" class="btn btn-primary">
                            콘텐츠 등록
                        </a>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body d-flex flex-wrap gap-2">
                        <a th:href="@{/admin/onboarding/contents}" class="btn btn-primary">
                            콘텐츠 관리
                        </a>

                        <a th:href="@{/admin/onboarding/documents}" class="btn btn-outline-primary">
                            문서/RAG 관리
                        </a>

                        <a th:href="@{/admin/onboarding/roadmaps}" class="btn btn-outline-primary">
                            로드맵 관리
                        </a>

                        <a th:href="@{/admin/onboarding/schedules}" class="btn btn-outline-primary">
                            일정 관리
                        </a>

                        <a th:href="@{/admin/onboarding/checklists}" class="btn btn-outline-primary">
                            체크리스트 관리 (구현 중)
                        </a>

                        <a th:href="@{/admin/onboarding/progress}" class="btn btn-outline-primary">
                            진행 현황 (구현 중)
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
