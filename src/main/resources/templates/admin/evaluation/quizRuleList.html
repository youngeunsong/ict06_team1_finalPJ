<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title">AI 퀴즈 출제 기준 관리</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3>AI 퀴즈 출제 기준 관리</h3>
                        <p class="text-muted mb-0">
                            카테고리별 AI 퀴즈 출제 기준을 관리합니다.
                        </p>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/admin/evaluation/quiz-rules/new}" class="btn btn-primary text-nowrap">
                            기준 등록
                        </a>
                    </div>
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-5">
                                <input type="text" class="form-control" id="quizRuleSearchInput" placeholder="카테고리, 유형, 난이도 검색">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="quizRuleTypeFilter">
                                    <option value="">전체 문항 유형</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="quizRuleActiveFilter">
                                    <option value="">전체 사용 여부</option>
                                    <option value="사용">사용</option>
                                    <option value="미사용">미사용</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select mb-2" id="quizRuleSortOrder">
                                    <option value="id-asc">정렬: ID 오름차순</option>
                                    <option value="id-desc">정렬: ID 내림차순</option>
                                    <option value="category-asc">정렬: 카테고리 가나다순</option>
                                    <option value="count-desc">정렬: 문항 수 많은 순</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary w-100" id="quizRuleFilterReset">초기화</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                        <table class="table table-hover align-middle" id="quizRuleTable">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>카테고리</th>
                                <th>문항 수</th>
                                <th>합격 점수</th>
                                <th>난이도</th>
                                <th>문항 유형</th>
                                <th>사용 여부</th>
                                <th>관리</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="rule, iterStat : ${rules}" class="quiz-rule-row">
                                <td th:text="${rule.ruleId}">1</td>
                                <td th:text="${rule.categoryName}" class="quiz-rule-category">전사</td>
                                <td th:text="${rule.questionCount}">5</td>
                                <td th:text="|${rule.passScore}점|">80점</td>
                                <td th:text="${rule.difficulty.label}" class="quiz-rule-difficulty">쉬움</td>
                                <td th:text="${rule.questionType.label}" class="quiz-rule-type">객관식</td>
                                <td class="quiz-rule-active">
                                    <span th:if="${rule.isActive != null and rule.isActive}" class="badge bg-success">사용</span>
                                    <span th:unless="${rule.isActive != null and rule.isActive}" class="badge bg-secondary">미사용</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <a class="btn btn-sm btn-outline-primary"
                                           th:href="@{/admin/evaluation/quiz-rules/{id}/edit(id=${rule.ruleId})}">
                                            수정
                                        </a>
                                        <form th:action="@{/admin/evaluation/quiz-rules/{id}/delete(id=${rule.ruleId})}"
                                              method="post"
                                              onsubmit="return confirm('AI 퀴즈 출제 기준을 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                삭제
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rules)}">
                                <td colspan="8" class="text-center text-muted">
                                    등록된 AI 퀴즈 출제 기준이 없습니다.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rows = Array.from(document.querySelectorAll('#quizRuleTable tbody .quiz-rule-row'));
        const searchInput = document.getElementById('quizRuleSearchInput');
        const typeFilter = document.getElementById('quizRuleTypeFilter');
        const activeFilter = document.getElementById('quizRuleActiveFilter');
        const sortOrder = document.getElementById('quizRuleSortOrder');
        const resetButton = document.getElementById('quizRuleFilterReset');
        const tbody = document.querySelector('#quizRuleTable tbody');

        const uniqueTypes = [...new Set(rows.map((row) => row.querySelector('.quiz-rule-type')?.innerText.trim()).filter(Boolean))];
        typeFilter.innerHTML = '<option value="">전체 문항 유형</option>' +
            uniqueTypes.map((type) => `<option value="${type}">${type}</option>`).join('');

        const sortRows = () => {
            const sortValue = sortOrder.value;
            const sortedRows = [...rows].sort((a, b) => {
                if (sortValue === 'id-asc' || sortValue === 'id-desc') {
                    const aId = Number(a.children[0]?.innerText.trim() || 0);
                    const bId = Number(b.children[0]?.innerText.trim() || 0);
                    return sortValue === 'id-asc' ? aId - bId : bId - aId;
                }

                if (sortValue === 'category-asc') {
                    return (a.querySelector('.quiz-rule-category')?.innerText || '').localeCompare(b.querySelector('.quiz-rule-category')?.innerText || '', 'ko');
                }

                if (sortValue === 'count-desc') {
                    const aCount = Number(a.children[2]?.innerText.trim() || 0);
                    const bCount = Number(b.children[2]?.innerText.trim() || 0);
                    return bCount - aCount;
                }

                return 0;
            });

            sortedRows.forEach((row) => tbody.appendChild(row));
        };

        const applyFilters = () => {
            const searchValue = searchInput.value.trim().toLowerCase();
            const typeValue = typeFilter.value;
            const activeValue = activeFilter.value;

            rows.forEach((row) => {
                const rowText = row.innerText.toLowerCase();
                const rowType = row.querySelector('.quiz-rule-type')?.innerText.trim() || '';
                const rowActive = row.querySelector('.quiz-rule-active')?.innerText.trim() || '';

                const matchesSearch = !searchValue || rowText.includes(searchValue);
                const matchesType = !typeValue || rowType === typeValue;
                const matchesActive = !activeValue || rowActive.includes(activeValue);

                row.style.display = matchesSearch && matchesType && matchesActive ? '' : 'none';
            });
        };

        [searchInput, typeFilter, activeFilter].forEach((element) => {
            element.addEventListener('input', applyFilters);
            element.addEventListener('change', applyFilters);
        });
        sortOrder.addEventListener('change', sortRows);

        resetButton.addEventListener('click', function () {
            searchInput.value = '';
            typeFilter.value = '';
            activeFilter.value = '';
            sortOrder.value = 'id-asc';
            sortRows();
            applyFilters();
        });

        sortRows();
    });
</script>
</body>
</html>
