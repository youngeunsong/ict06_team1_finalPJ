<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title">온보딩 평가 관리</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid p-4" style="max-width: 1200px; margin: 0 auto;">
                <div class="row mb-3">
                    <div class="col">
                        <h3>온보딩 평가 관리</h3>
                        <p class="text-muted mb-0">AI 퀴즈 출제 기준과 문제 자동 생성 기능을 관리합니다.</p>
                    </div>
                </div>

                <div class="row g-4 justify-content-center">
                    <div class="col-md-6 col-lg-4 col-xxl-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">AI 퀴즈 출제 기준</h5>
                                <p class="card-text text-muted flex-grow-1">
                                    카테고리별 문항 수, 합격 점수, 난이도, 문항 유형을 설정하고
                                    현재 운영 중인 출제 규칙을 관리합니다.
                                </p>
                                <div class="d-inline-flex">
                                    <a th:href="@{/admin/evaluation/quiz-rules}" class="btn btn-primary btn-sm text-nowrap px-3">관리하기</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-4 col-xxl-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">AI 퀴즈 자동 생성</h5>
                                <p class="card-text text-muted flex-grow-1">
                                    선택한 콘텐츠를 기준으로 객관식 문제 초안을 생성하고
                                    검토 후 바로 저장할 수 있습니다.
                                </p>
                                <div class="d-inline-flex">
                                    <a th:href="@{/admin/evaluation/quiz-generator}" class="btn btn-outline-primary btn-sm text-nowrap px-3">초안 생성하기</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-4 col-xxl-3">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">평가 문제 목록</h5>
                                <p class="card-text text-muted flex-grow-1">
                                    현재 저장된 평가 문제를 카테고리와 유형별로 확인하고
                                    자동 생성된 문제 반영 결과도 바로 검토할 수 있습니다.
                                </p>
                                <div class="d-inline-flex">
                                    <a th:href="@{/admin/evaluation/questions}" class="btn btn-outline-secondary btn-sm text-nowrap px-3">문제 목록 보기</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
</html>
