<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{/admin/common/head.html :: common_header}">
    <meta charset="UTF-8">
    <title id="page_title">AI 퀴즈 자동 생성</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3>AI 퀴즈 자동 생성</h3>
                        <p class="text-muted mb-0">콘텐츠 1건을 기준으로 객관식과 단답형 문제 초안을 생성하고 검토 후 저장합니다.</p>
                    </div>
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/admin/evaluation/quiz-generator/preview}" method="post" th:object="${requestDto}">
                            <div class="row g-3">
                                <div class="col-lg-7">
                                    <label for="contentId" class="form-label">기준 콘텐츠</label>
                                    <select id="contentId" class="form-select" th:field="*{contentId}" required>
                                        <option value="">콘텐츠를 선택하세요</option>
                                        <option th:each="content : ${contents}"
                                                th:value="${content.contentId}"
                                                th:text="|[${content.category}] ${content.title} (${content.type})|">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label for="questionCount" class="form-label">문항 수</label>
                                    <input id="questionCount" type="number" min="1" max="10" class="form-control" th:field="*{questionCount}" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="difficulty" class="form-label">난이도</label>
                                    <select id="difficulty" class="form-select" th:field="*{difficulty}">
                                        <option th:each="difficulty : ${difficulties}"
                                                th:value="${difficulty}"
                                                th:text="${difficulty.label}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-3 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">AI 문제 초안 생성</button>
                                <a th:href="@{/admin/evaluation/main}" class="btn btn-outline-secondary">평가 메인으로</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card" th:if="${generatedQuestions != null}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h5 class="mb-1">생성된 문제 초안</h5>
                                <p class="text-muted mb-0"
                                   th:if="${selectedContent != null}"
                                   th:text="|기준 콘텐츠: [${selectedContent.category}] ${selectedContent.title}|">
                                </p>
                            </div>
                            <form th:action="@{/admin/evaluation/quiz-generator/save}" method="post">
                                <input type="hidden" name="contentId" th:value="${requestDto.contentId}">
                                <input type="hidden" name="generatedQuestionsJson" th:value="${generatedQuestionsJson}">
                                <button type="submit" class="btn btn-success">초안 저장</button>
                            </form>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered align-middle">
                                <thead>
                                <tr>
                                    <th style="min-width: 120px;">유형</th>
                                    <th style="min-width: 280px;">문제</th>
                                    <th style="min-width: 320px;">보기 / 모범답안</th>
                                    <th style="min-width: 200px;">정답 / 키워드</th>
                                    <th style="min-width: 220px;">해설 / 루브릭</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="question, stat : ${generatedQuestions}">
                                    <td>
                                        <span class="badge text-bg-primary"
                                              th:text="${question.questionType == 'SHORT_ANSWER' ? '단답형' : question.questionType == 'ESSAY' ? '서술형' : '객관식'}">객관식</span>
                                    </td>
                                    <td>
                                        <strong th:text="|Q${stat.index + 1}.|"></strong>
                                        <div th:text="${question.questionText}"></div>
                                    </td>
                                    <td>
                                        <div th:if="${question.questionType == 'MULTIPLE_CHOICE'}">
                                            <div th:text="|1. ${question.option1}|"></div>
                                            <div th:text="|2. ${question.option2}|"></div>
                                            <div th:text="|3. ${question.option3}|"></div>
                                            <div th:text="|4. ${question.option4}|"></div>
                                        </div>
                                        <div th:if="${question.questionType != 'MULTIPLE_CHOICE'}">
                                            <strong>모범답안</strong>
                                            <div th:text="${question.sampleAnswer != null ? question.sampleAnswer : '-'}"></div>
                                        </div>
                                    </td>
                                    <td>
                                        <div th:if="${question.questionType == 'MULTIPLE_CHOICE'}">
                                            <span th:if="${question.answerNo == 1}" th:text="|1. ${question.option1}|"></span>
                                            <span th:if="${question.answerNo == 2}" th:text="|2. ${question.option2}|"></span>
                                            <span th:if="${question.answerNo == 3}" th:text="|3. ${question.option3}|"></span>
                                            <span th:if="${question.answerNo == 4}" th:text="|4. ${question.option4}|"></span>
                                        </div>
                                        <div th:if="${question.questionType != 'MULTIPLE_CHOICE'}">
                                            <strong>핵심 키워드</strong>
                                            <div th:text="${question.keywordAnswer != null ? #strings.listJoin(question.keywordAnswer, ', ') : '-'}"></div>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="mb-2" th:text="${question.explanation}"></div>
                                        <div th:if="${question.questionType != 'MULTIPLE_CHOICE'}" class="text-muted small">
                                            <strong>채점 기준:</strong>
                                            <span th:text="${question.rubric != null ? question.rubric : '-'}"></span>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <p class="text-muted mb-0">
                            저장하면 평가 문제 목록에 바로 반영됩니다. 필요하면 다시 생성해서 다른 초안과 비교할 수 있습니다.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
</html>
