<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/admin/common/head.html :: common_header}">
    <meta charset="UTF-8">
    <title id="page_title">평가 문제 목록</title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3 align-items-start">
                    <div class="col">
                        <h3>평가 문제 목록</h3>
                        <p class="text-muted mb-0">카테고리별 등록 문제와 AI 자동생성 여부를 확인하고 직접 수정할 수 있습니다.</p>
                    </div>
                    <div class="col-auto">
                        <div class="d-flex gap-2 flex-nowrap">
                            <a th:href="@{/admin/evaluation/quiz-generator}" class="btn btn-primary btn-sm text-nowrap px-3">AI 문제 생성</a>
                            <a th:href="@{/admin/evaluation/main}" class="btn btn-outline-secondary btn-sm text-nowrap px-3">평가 메인</a>
                        </div>
                    </div>
                </div>

                <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-4">
                                <input type="text" class="form-control" id="questionSearchInput" placeholder="문제, 카테고리, 콘텐츠명 검색">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="questionCategoryFilter">
                                    <option value="">전체 카테고리</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="questionTypeFilter">
                                    <option value="">전체 유형</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="questionSourceFilter">
                                    <option value="">전체 출처</option>
                                </select>
                            </div>
                            <div class="col-md-1">
                                <button type="button" class="btn btn-outline-secondary w-100" id="questionFilterReset">초기화</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="questionTable">
                                <thead>
                                <tr>
                                    <th style="min-width: 70px;">ID</th>
                                    <th style="min-width: 110px;">카테고리</th>
                                    <th style="min-width: 110px;">유형</th>
                                    <th style="min-width: 120px;">출처</th>
                                    <th style="min-width: 280px;">문제</th>
                                    <th style="min-width: 220px;">콘텐츠</th>
                                    <th style="min-width: 90px;">배점</th>
                                    <th style="min-width: 180px;">정답</th>
                                    <th style="min-width: 150px;">관리</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="question : ${questions}" class="question-row">
                                    <td th:text="${question.questionId}">1</td>
                                    <td class="question-category" th:text="${question.categoryName}">개발</td>
                                    <td class="question-type" th:text="${question.questionType.label}">객관식</td>
                                    <td class="question-source">
                                        <span class="badge text-bg-primary"
                                              th:if="${question.explanation != null and (#strings.startsWith(question.explanation, '[AI자동생성]') or #strings.startsWith(question.explanation, '[AI?먮룞?앹꽦]'))}">AI 자동생성</span>
                                        <span class="badge text-bg-secondary"
                                              th:if="${question.explanation == null or !(#strings.startsWith(question.explanation, '[AI자동생성]') or #strings.startsWith(question.explanation, '[AI?먮룞?앹꽦]'))}">직접등록/시드</span>
                                    </td>
                                    <td th:text="${question.questionText}">문제 내용</td>
                                    <td class="question-content" th:text="${question.content != null ? question.content.title : '-'}">콘텐츠명</td>
                                    <td th:text="${question.score}">10</td>
                                    <td>
                                        <span th:if="${question.questionType.name() == 'MULTIPLE_CHOICE' and question.answerNo == 1}" th:text="|1. ${question.option1}|"></span>
                                        <span th:if="${question.questionType.name() == 'MULTIPLE_CHOICE' and question.answerNo == 2}" th:text="|2. ${question.option2}|"></span>
                                        <span th:if="${question.questionType.name() == 'MULTIPLE_CHOICE' and question.answerNo == 3}" th:text="|3. ${question.option3}|"></span>
                                        <span th:if="${question.questionType.name() == 'MULTIPLE_CHOICE' and question.answerNo == 4}" th:text="|4. ${question.option4}|"></span>
                                        <span th:if="${question.questionType.name() != 'MULTIPLE_CHOICE'}"
                                              th:text="${question.sampleAnswer != null ? question.sampleAnswer : '-'}"></span>
                                    </td>
                                    <td>
                                        <div class="d-flex flex-nowrap gap-1">
                                            <a class="btn btn-sm btn-outline-primary"
                                               th:href="@{/admin/evaluation/questions/{questionId}/edit(questionId=${question.questionId})}">수정</a>
                                            <form th:action="@{/admin/evaluation/questions/{questionId}/delete(questionId=${question.questionId})}"
                                                  method="post"
                                                  onsubmit="return confirm('이 평가 문제를 삭제하시겠습니까?');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(questions)}">
                                    <td colspan="9" class="text-center text-muted">등록된 평가 문제가 없습니다.</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rows = Array.from(document.querySelectorAll('#questionTable tbody .question-row'));
        const searchInput = document.getElementById('questionSearchInput');
        const categoryFilter = document.getElementById('questionCategoryFilter');
        const typeFilter = document.getElementById('questionTypeFilter');
        const sourceFilter = document.getElementById('questionSourceFilter');
        const resetButton = document.getElementById('questionFilterReset');

        const categories = [...new Set(rows.map((row) => row.querySelector('.question-category')?.innerText.trim()).filter(Boolean))];
        const types = [...new Set(rows.map((row) => row.querySelector('.question-type')?.innerText.trim()).filter(Boolean))];
        const sources = [...new Set(rows.map((row) => row.querySelector('.question-source')?.innerText.trim()).filter(Boolean))];

        categoryFilter.innerHTML = '<option value="">전체 카테고리</option>' +
            categories.map((category) => `<option value="${category}">${category}</option>`).join('');
        typeFilter.innerHTML = '<option value="">전체 유형</option>' +
            types.map((type) => `<option value="${type}">${type}</option>`).join('');
        sourceFilter.innerHTML = '<option value="">전체 출처</option>' +
            sources.map((source) => `<option value="${source}">${source}</option>`).join('');

        const applyFilters = () => {
            const searchValue = searchInput.value.trim().toLowerCase();
            const categoryValue = categoryFilter.value;
            const typeValue = typeFilter.value;
            const sourceValue = sourceFilter.value;

            rows.forEach((row) => {
                const rowText = row.innerText.toLowerCase();
                const rowCategory = row.querySelector('.question-category')?.innerText.trim() || '';
                const rowType = row.querySelector('.question-type')?.innerText.trim() || '';
                const rowSource = row.querySelector('.question-source')?.innerText.trim() || '';

                const matchesSearch = !searchValue || rowText.includes(searchValue);
                const matchesCategory = !categoryValue || rowCategory === categoryValue;
                const matchesType = !typeValue || rowType === typeValue;
                const matchesSource = !sourceValue || rowSource === sourceValue;

                row.style.display = matchesSearch && matchesCategory && matchesType && matchesSource ? '' : 'none';
            });
        };

        [searchInput, categoryFilter, typeFilter, sourceFilter].forEach((element) => {
            element.addEventListener('input', applyFilters);
            element.addEventListener('change', applyFilters);
        });

        resetButton.addEventListener('click', function () {
            searchInput.value = '';
            categoryFilter.value = '';
            typeFilter.value = '';
            sourceFilter.value = '';
            applyFilters();
        });
    });
</script>
</body>
</html>
