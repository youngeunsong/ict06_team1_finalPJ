<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="/admin/common/head.html :: common_header">
    <meta charset="UTF-8">
    <title id="page_title" th:text="${isEdit} ? 'AI 퀴즈 출제 기준 수정' : 'AI 퀴즈 출제 기준 등록'">
        AI 퀴즈 출제 기준 등록
    </title>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <th:block th:replace="~{/admin/common/header}"></th:block>
    <th:block th:replace="~{/admin/common/sidebar}"></th:block>

    <main class="app-main">
        <div class="app-content">
            <div class="container-fluid">
                <div class="row mb-3">
                    <div class="col">
                        <h3 th:text="${isEdit} ? 'AI 퀴즈 출제 기준 수정' : 'AI 퀴즈 출제 기준 등록'">
                            AI 퀴즈 출제 기준 등록
                        </h3>
                        <p class="text-muted mb-0">
                            카테고리별 퀴즈 출제 기준값을 관리합니다.
                        </p>
                    </div>
                </div>

                <form th:action="${isEdit}
                        ? @{/admin/evaluation/quiz-rules/{id}/edit(id=${rule.ruleId})}
                        : @{/admin/evaluation/quiz-rules}"
                      method="post">
                    <div class="card">
                        <div class="card-header">
                            <strong>출제 기준 정보</strong>
                        </div>

                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">카테고리</label>
                                    <select name="categoryName" class="form-select" required>
                                        <option value="">선택</option>
                                        <option th:each="category : ${categories}"
                                                th:value="${category}"
                                                th:text="${category}"
                                                th:selected="${rule.categoryName != null and rule.categoryName == category}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">문항 유형</label>
                                    <select name="questionType" class="form-select" required>
                                        <option value="">선택</option>
                                        <option th:each="questionType : ${questionTypes}"
                                                th:value="${questionType}"
                                                th:text="${questionType.label}"
                                                th:selected="${rule.questionType != null and rule.questionType == questionType}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">문항 수</label>
                                    <input type="number"
                                           name="questionCount"
                                           class="form-control"
                                           min="1"
                                           max="50"
                                           th:value="${rule.questionCount}"
                                           required>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">합격 점수</label>
                                    <input type="number"
                                           name="passScore"
                                           class="form-control"
                                           min="0"
                                           max="100"
                                           th:value="${rule.passScore}"
                                           required>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label">난이도</label>
                                    <select name="difficulty" class="form-select" required>
                                        <option value="">선택</option>
                                        <option th:each="difficulty : ${difficulties}"
                                                th:value="${difficulty}"
                                                th:text="${difficulty.label}"
                                                th:selected="${rule.difficulty != null and rule.difficulty == difficulty}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-check mb-0">
                                <input type="checkbox"
                                       name="isActive"
                                       value="true"
                                       class="form-check-input"
                                       id="isActive"
                                       th:checked="${rule.isActive}">
                                <label class="form-check-label" for="isActive">
                                    사용
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a th:href="@{/admin/evaluation/quiz-rules}" class="btn btn-outline-secondary">
                            목록으로
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${isEdit} ? '수정' : '등록'">등록</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block th:replace="~{/admin/common/footer}"></th:block>
</div>
<th:block th:replace="~{/admin/common/commonJs}"></th:block>
</body>
</html>
